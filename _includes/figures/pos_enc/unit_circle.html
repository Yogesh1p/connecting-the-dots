<div class="anim-wrap">
  <span class="anim-title">Interactive · Unit Circle</span>

  <canvas
    id="pe-unit-circle"
    width="600"
    height="310"
    style="display:block; width:100%;"
  ></canvas>

  <div class="anim-controls">
    <label>ω (frequency)</label>
    <input
      type="range"
      id="omega-slider"
      min="0.05"
      max="1.5"
      step="0.01"
      value="0.30"
    >
    <span id="omega-value">0.30</span>
  </div>

  <div class="anim-caption">
    Each token position <em>i</em> maps to a point on the unit circle via angle ω·i.
    Drag ω to change the angular spacing between positions.
  </div>
</div>

<script>
(() => {
    const canvas = document.getElementById("pe-unit-circle");
    if (!canvas) return;

    const slider = document.getElementById("omega-slider");
    const value = document.getElementById("omega-value");
    const ctx = canvas.getContext("2d");

    let omega = parseFloat(slider.value);
    let tick = 0;
    const N = 16;

    function resize() {
        const dpr = window.devicePixelRatio || 1;
        const width = canvas.parentElement.clientWidth;
        const height = parseInt(canvas.getAttribute("height"), 10);

        canvas.width = width * dpr;
        canvas.height = height * dpr;
        canvas.style.width = width + "px";
        canvas.style.height = height + "px";

        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        return { width, height };
    }

    let { width, height } = resize();

    window.addEventListener("resize", () => {
        ({ width, height } = resize());
    });

    slider.addEventListener("input", () => {
        omega = parseFloat(slider.value);
        value.textContent = omega.toFixed(2);
    });

    function drawCircle(x, y, r, color, lineWidth = 1.5) {
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.strokeStyle = color;
        ctx.lineWidth = lineWidth;
        ctx.stroke();
    }

    function drawDot(x, y, r, color) {
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
    }

    function draw() {
        const styles = getComputedStyle(document.documentElement);
        const accent = styles.getPropertyValue("--accent").trim() || "#D48C70";
        const border = styles.getPropertyValue("--border").trim() || "#cccccc";
        const text = styles.getPropertyValue("--text").trim() || "#222222";

        ctx.clearRect(0, 0, width, height);

        const cx = width / 2;
        const cy = height / 2;
        const R = Math.min(width, height) * 0.32;

        // axes
        ctx.strokeStyle = border;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(cx - R - 14, cy);
        ctx.lineTo(cx + R + 14, cy);
        ctx.moveTo(cx, cy - R - 14);
        ctx.lineTo(cx, cy + R + 14);
        ctx.stroke();

        drawCircle(cx, cy, R, border);

        // position points
        for (let i = 0; i < N; i++) {
            const a = omega * i;
            const x = cx + R * Math.cos(a);
            const y = cy - R * Math.sin(a);

            drawDot(x, y, 3, accent);
        }

        // active animated point
        const active = Math.floor((tick * 0.55) % N);
        const angle = omega * active;

        const px = cx + R * Math.cos(angle);
        const py = cy - R * Math.sin(angle);

        ctx.save();
        ctx.setLineDash([4, 4]);
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(px, py);
        ctx.strokeStyle = accent;
        ctx.stroke();
        ctx.restore();

        drawDot(px, py, 6, accent);

        ctx.font = "11px Lora, serif";
        ctx.fillStyle = text;
        ctx.textAlign = "center";
        ctx.fillText(
            `PE(${active}) = [${Math.cos(angle).toFixed(2)}, ${Math.sin(angle).toFixed(2)}]`,
            cx,
            height - 16
        );

        tick += 0.025;
        requestAnimationFrame(draw);
    }

    draw();
})();
</script>
