<div class="anim-wrap">
  <span class="anim-title">Interactive · Relative Similarity</span>
  <canvas id="pe-relative-similarity" width="600" height="290"></canvas>

  <div class="anim-controls">
    <label>position i</label>
    <input type="range" id="pe-pos-i" min="0" max="20" step="1" value="3">
    <span id="pe-pos-i-value">3</span>

    <label style="margin-left:10px">position j</label>
    <input type="range" id="pe-pos-j" min="0" max="20" step="1" value="7">
    <span id="pe-pos-j-value">7</span>
  </div>

  <div class="anim-caption">
    Two tokens sit at positions <em>i</em> and <em>j</em> on the unit circle. Their dot product equals cos(ω·|i−j|).
  </div>
</div>

<style>
.anim-wrap {
    margin: 2.4em auto;
    border-radius: 10px;
    overflow: hidden;
    background: var(--card-bg);
    border: 1px solid var(--border);
    box-shadow: 0 3px 18px rgba(0,0,0,0.06);
    position: relative;
    font-family: 'Lora', serif;
    padding-top: 35px; /* creates title strip */
}
.anim-title {
    position: absolute;
    top: 1px;
    left: 10px;
    font-size: 0.67rem;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: var(--muted);
    pointer-events: none;
}
.anim-wrap canvas {
    display: block;
    width: 100%;
}
.anim-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 2px 18px 12px;
    flex-wrap: wrap;
}
.anim-controls label {
    font-size: 0.72rem;
    color: var(--muted);
}
.anim-controls input[type=range] {
    flex: 1;
    min-width: 80px;
    accent-color: var(--accent);
}
.anim-controls span {
    font-size: 0.72rem;
    color: var(--accent);
    font-family: monospace;
    min-width: 30px;
}
.anim-caption {
    padding: 8px 18px 13px;
    font-size: 0.79rem;
    color: var(--muted);
    text-align: center;
    font-style: italic;
    border-top: 1px solid var(--border);
}
</style>

<script>
(function () {
    const canvas = document.getElementById("pe-relative-similarity");
    if (!canvas) return;

    const sI = document.getElementById("pe-pos-i");
    const sJ = document.getElementById("pe-pos-j");
    const vI = document.getElementById("pe-pos-i-value");
    const vJ = document.getElementById("pe-pos-j-value");

    let posI = parseInt(sI.value, 10);
    let posJ = parseInt(sJ.value, 10);
    const OMEGA = 0.35;

    function T() {
        const s = getComputedStyle(document.documentElement);
        const get = v => s.getPropertyValue(v).trim();
        return {
            text: get("--text"),
            muted: get("--muted"),
            accent: get("--accent"),
            border: get("--border"),
            slate: "#6E8FA8",
            sage: "#7A9E8A",
            sand: "#C4A060"
        };
    }

    function fit() {
        const dpr = window.devicePixelRatio || 1;
        const w = canvas.parentElement.clientWidth;
        const h = parseInt(canvas.getAttribute("height"), 10);

        canvas.width = w * dpr;
        canvas.height = h * dpr;
        canvas.style.width = w + "px";
        canvas.style.height = h + "px";

        const ctx = canvas.getContext("2d");
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        return { ctx, w, h };
    }

    function line(ctx, x1, y1, x2, y2, color, width = 1, dash = []) {
        ctx.save();
        ctx.beginPath();
        ctx.setLineDash(dash);
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.strokeStyle = color;
        ctx.lineWidth = width;
        ctx.stroke();
        ctx.restore();
    }

    function circle(ctx, cx, cy, r, color, width = 1) {
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.strokeStyle = color;
        ctx.lineWidth = width;
        ctx.stroke();
    }

    function dot(ctx, x, y, r, color) {
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
    }

    function label(ctx, text, x, y, color, size = 11, align = "center") {
        ctx.font = `${size}px Lora, serif`;
        ctx.fillStyle = color;
        ctx.textAlign = align;
        ctx.textBaseline = "middle";
        ctx.fillText(text, x, y);
    }

    let { ctx, w, h } = fit();
    window.addEventListener("resize", () => {
        ({ ctx, w, h } = fit());
    });

    sI.addEventListener("input", () => {
        posI = parseInt(sI.value, 10);
        vI.textContent = posI;
    });

    sJ.addEventListener("input", () => {
        posJ = parseInt(sJ.value, 10);
        vJ.textContent = posJ;
    });

    function draw() {
        const t = T();
        ctx.clearRect(0, 0, w, h);

        // LEFT PANEL
        const cx = w * 0.29;
        const cy = h / 2;
        const R = Math.min(w * 0.22, h * 0.38);

        circle(ctx, cx, cy, R, t.border, 1);

        const ai = OMEGA * posI;
        const aj = OMEGA * posJ;

        const pIx = cx + R * Math.cos(ai);
        const pIy = cy - R * Math.sin(ai);

        const pJx = cx + R * Math.cos(aj);
        const pJy = cy - R * Math.sin(aj);

        line(ctx, cx, cy, pIx, pIy, t.accent, 2);
        line(ctx, cx, cy, pJx, pJy, t.slate, 2);

        dot(ctx, pIx, pIy, 5.5, t.accent);
        dot(ctx, pJx, pJy, 5.5, t.slate);

        label(ctx, `i=${posI}`, pIx, pIy - 14, t.accent, 10);
        label(ctx, `j=${posJ}`, pJx, pJy - 14, t.slate, 10);

        // RIGHT PANEL
        const pX = w * 0.56;
        const pY = cy;
        const pW = w * 0.38;
        const pH = h * 0.44;
        const maxD = 20;

        line(ctx, pX, pY - pH / 2, pX, pY + pH / 2, t.border, 1);
        line(ctx, pX, pY, pX + pW, pY, t.border, 1);

        ctx.beginPath();
        for (let d = 0; d <= maxD; d += 0.08) {
            const x = pX + (d / maxD) * pW;
            const y = pY - Math.cos(OMEGA * d) * (pH / 2 - 6);
            d === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.strokeStyle = t.sage;
        ctx.lineWidth = 1.8;
        ctx.stroke();

        const delta = Math.abs(posI - posJ);
        const dotV = Math.cos(OMEGA * delta);

        const mx = pX + (delta / maxD) * pW;
        const my = pY - dotV * (pH / 2 - 6);

        line(ctx, mx, pY, mx, my, t.muted, 1, [3, 3]);
        dot(ctx, mx, my, 6, t.sage);

        label(ctx, `|i-j| = ${delta}`, pX + pW / 2, pY + pH / 2 + 14, t.muted, 10);
        label(ctx, `dot = ${dotV.toFixed(3)}`, pX + pW / 2, pY - pH / 2 - 14, t.sage, 11);

        requestAnimationFrame(draw);
    }

    draw();
})();
</script>
