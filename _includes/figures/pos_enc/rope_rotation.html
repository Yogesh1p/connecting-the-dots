<div class="anim-wrap">
  <span class="anim-title">Interactive · Relative Phase in RoPE</span>
  <canvas id="pe-rope-phase" width="600" height="360"></canvas>

  <div class="anim-controls">
    <label>offset j − i</label>
    <input type="range" id="pe-rope-gap" min="-10" max="10" step="1" value="3">
    <span id="pe-rope-gap-value">3</span>
  </div>

  <div class="anim-caption">
    RoPE works because attention depends only on the angular gap between
    the query and key vectors — not their absolute positions.
  </div>
</div>

<style>
.anim-wrap {
    margin: 2.4em auto;
    border-radius: 10px;
    overflow: hidden;
    background: var(--card-bg);
    border: 1px solid var(--border);
    box-shadow: 0 3px 18px rgba(0,0,0,0.06);
    position: relative;
    font-family: 'Lora', serif;
}
.anim-title {
    position: absolute;
    top: 12px;
    left: 15px;
    font-size: 0.67rem;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: var(--muted);
}
.anim-wrap canvas {
    display: block;
    width: 100%;
}
.anim-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 18px 12px;
}
.anim-controls label {
    font-size: 0.8rem;
    color: var(--muted);
}
.anim-controls input[type=range] {
    flex: 1;
    accent-color: var(--accent);
}
.anim-controls span {
    min-width: 32px;
    color: var(--accent);
    font-family: monospace;
}
.anim-caption {
    padding: 10px 18px 14px;
    font-size: 0.9rem;
    color: var(--muted);
    text-align: center;
    font-style: italic;
    border-top: 1px solid var(--border);
}
</style>

<script>
(function () {
    const canvas = document.getElementById("pe-rope-phase");
    const slider = document.getElementById("pe-rope-gap");
    const value = document.getElementById("pe-rope-gap-value");
    if (!canvas) return;

    let gap = parseInt(slider.value, 10);
    let tick = 0;

    slider.addEventListener("input", () => {
        gap = parseInt(slider.value, 10);
        value.textContent = gap;
    });

    function T() {
        const s = getComputedStyle(document.documentElement);
        const get = v => s.getPropertyValue(v).trim();
        return {
            text: get("--text"),
            muted: get("--muted"),
            border: get("--border"),
            accent: get("--accent"),
            slate: "#6E8FA8",
            sage: "#7A9E8A"
        };
    }

    function fit() {
        const dpr = window.devicePixelRatio || 1;
        const w = canvas.parentElement.clientWidth;
        const h = parseInt(canvas.getAttribute("height"), 10);

        canvas.width = w * dpr;
        canvas.height = h * dpr;
        canvas.style.width = w + "px";
        canvas.style.height = h + "px";

        const ctx = canvas.getContext("2d");
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        return { ctx, w, h };
    }

    function circle(ctx, x, y, r, color) {
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.strokeStyle = color;
        ctx.lineWidth = 1.2;
        ctx.stroke();
    }

    function line(ctx, x1, y1, x2, y2, color, width = 2) {
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.strokeStyle = color;
        ctx.lineWidth = width;
        ctx.stroke();
    }

    function dot(ctx, x, y, r, color) {
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
    }

    function label(ctx, txt, x, y, color, size = 12) {
        ctx.font = `${size}px Lora, serif`;
        ctx.fillStyle = color;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(txt, x, y);
    }

    let { ctx, w, h } = fit();
    window.addEventListener("resize", () => {
        ({ ctx, w, h } = fit());
    });

    function draw() {
        const t = T();
        ctx.clearRect(0, 0, w, h);

        const cx = w / 2;
        const cy = h * 0.46;
        const R = Math.min(w * 0.22, h * 0.28);

        circle(ctx, cx, cy, R, t.border);

        const base = 0.5 + 0.25 * Math.sin(tick * 0.5);
        const omega = 0.4;

        const thetaQ = base;
        const thetaK = base + omega * gap;

        const qx = cx + R * Math.cos(thetaQ);
        const qy = cy - R * Math.sin(thetaQ);

        const kx = cx + R * Math.cos(thetaK);
        const ky = cy - R * Math.sin(thetaK);

        // vectors
        line(ctx, cx, cy, qx, qy, t.accent, 2.4);
        line(ctx, cx, cy, kx, ky, t.slate, 2.4);

        dot(ctx, qx, qy, 7, t.accent);
        dot(ctx, kx, ky, 7, t.slate);

        // relative arc
        ctx.beginPath();
        ctx.arc(cx, cy, R * 0.35, -thetaQ, -thetaK, gap < 0);
        ctx.strokeStyle = t.sage;
        ctx.lineWidth = 2.4;
        ctx.stroke();

        const similarity = Math.cos(thetaK - thetaQ);

        label(ctx, "q", qx + 16, qy, t.accent, 12);
        label(ctx, "k", kx + 16, ky, t.slate, 12);

        label(ctx, `relative gap = ${gap}`, cx, cy + R + 28, t.muted, 12);
        label(ctx, `dot = cos(Δθ) = ${similarity.toFixed(3)}`, cx, cy + R + 48, t.sage, 12);

        tick += 0.025;
        requestAnimationFrame(draw);
    }

    draw();
})();
</script>
