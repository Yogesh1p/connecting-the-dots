<!DOCTYPE html>
<html>
<head><title>Audio Debug</title></head>
<body style="font-family:monospace; padding:2rem; background:#111; color:#eee;">
<h2>Web Audio Debug</h2>
<div id="log" style="background:#000;padding:1rem;border-radius:8px;height:300px;overflow-y:auto;font-size:0.85rem;"></div>
<br>
<button id="btn1" style="padding:1rem 2rem;margin:0.5rem;font-size:1rem;cursor:pointer;">Test 1: Basic Oscillator</button>
<button id="btn2" style="padding:1rem 2rem;margin:0.5rem;font-size:1rem;cursor:pointer;">Test 2: Noise Burst</button>
<button id="btn3" style="padding:1rem 2rem;margin:0.5rem;font-size:1rem;cursor:pointer;">Test 3: Gain Ramp</button>
<button id="btn4" style="padding:1rem 2rem;margin:0.5rem;font-size:1rem;cursor:pointer;">Test 4: Full Crispy Click</button>

<script>
const log = document.getElementById('log');
function L(msg, color='#aaffaa') {
  log.innerHTML += `<div style="color:${color}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
  log.scrollTop = log.scrollHeight;
}

L('Page loaded. Click buttons to test audio.', '#ffff88');

// Test 1: Simplest possible oscillator
document.getElementById('btn1').addEventListener('click', () => {
  try {
    const AC = new (window.AudioContext || window.webkitAudioContext)();
    L(`AudioContext created. State: ${AC.state}`);
    
    AC.resume().then(() => {
      L(`AudioContext resumed. State: ${AC.state}`);
      
      const osc = AC.createOscillator();
      osc.connect(AC.destination);
      osc.frequency.value = 440;
      osc.start();
      osc.stop(AC.currentTime + 0.5);
      L('▶ Playing 440Hz sine for 0.5s — you should hear a tone', '#00ff88');
    });
  } catch(e) {
    L(`ERROR: ${e.message}`, '#ff4444');
  }
});

// Test 2: Noise burst
document.getElementById('btn2').addEventListener('click', () => {
  try {
    const AC = new (window.AudioContext || window.webkitAudioContext)();
    L(`AudioContext state: ${AC.state}`);
    AC.resume().then(() => {
      L(`After resume: ${AC.state}`);
      const frames = AC.sampleRate * 0.3;
      const buf = AC.createBuffer(1, frames, AC.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < frames; i++) data[i] = (Math.random() * 2 - 1) * 0.3;
      const src = AC.createBufferSource();
      src.buffer = buf;
      src.connect(AC.destination);
      src.start();
      L('▶ Playing white noise for 0.3s — you should hear a hiss', '#00ff88');
    });
  } catch(e) {
    L(`ERROR: ${e.message}`, '#ff4444');
  }
});

// Test 3: Gain node ramp (the usual silent killer)
document.getElementById('btn3').addEventListener('click', () => {
  try {
    const AC = new (window.AudioContext || window.webkitAudioContext)();
    AC.resume().then(() => {
      L(`State: ${AC.state}`);
      const osc = AC.createOscillator();
      const gain = AC.createGain();
      osc.connect(gain);
      gain.connect(AC.destination);
      
      const t = AC.currentTime;
      gain.gain.setValueAtTime(0.0001, t);           // anchor
      gain.gain.linearRampToValueAtTime(0.3, t + 0.05); // ramp up
      gain.gain.linearRampToValueAtTime(0.0001, t + 0.5); // ramp down
      
      osc.frequency.value = 880;
      osc.start(t);
      osc.stop(t + 0.6);
      L('▶ Playing 880Hz with gain ramp — tone should fade in/out', '#00ff88');
    });
  } catch(e) {
    L(`ERROR: ${e.message}`, '#ff4444');
  }
});

// Test 4: Full crispy click exactly as in the main file
document.getElementById('btn4').addEventListener('click', () => {
  try {
    const AC = new (window.AudioContext || window.webkitAudioContext)();
    AC.resume().then(() => {
      L(`State: ${AC.state}`);
      const t = AC.currentTime;
      const frames = Math.floor(AC.sampleRate * 0.04);
      const buf = AC.createBuffer(1, frames, AC.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < frames; i++) data[i] = Math.random() * 2 - 1;

      const src = AC.createBufferSource();
      src.buffer = buf;

      const bp = AC.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.value = 7000;
      bp.Q.value = 1.0;

      const g = AC.createGain();
      g.gain.setValueAtTime(0.3, t);
      g.gain.linearRampToValueAtTime(0.0001, t + 0.04);

      src.connect(bp);
      bp.connect(g);
      g.connect(AC.destination);
      src.start(t);
      L('▶ Playing crispy click — you should hear a sharp tick', '#00ff88');
      L(`sampleRate: ${AC.sampleRate}, frames: ${frames}`, '#aaaaff');
    });
  } catch(e) {
    L(`ERROR: ${e.message}`, '#ff4444');
  }
});
</script>
</body>
</html>
