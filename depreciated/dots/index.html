<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connecting the Dots</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/articles.css">

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Lora', Georgia, serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ═══════════════════════════════════════
       LAYOUT
    ═══════════════════════════════════════ */
    .layout {
      max-width: 900px;
      margin: 0 auto;
      padding: 4rem 2.5rem;
    }

    .content {
      width: 100%;
    }

    /* ═══════════════════════════════════════
       PREMIUM CONTROLS & SEARCH
    ═══════════════════════════════════════ */
    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1.5rem;
      padding-bottom: 2.5rem;
      flex-wrap: wrap;
    }

    .controls-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .search-wrap { 
      position: relative; 
      display: flex;
      align-items: center;
    }

    .search-icon {
      position: absolute;
      left: 1.2rem;
      width: 16px;
      height: 16px;
      color: var(--muted);
      pointer-events: none;
      transition: color 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      z-index: 2;
    }

    .search-wrap:focus-within .search-icon {
      color: var(--accent);
    }

    .archive-search {
      border: 1px solid var(--border);
      border-radius: 30px; 
      transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1); 
      color: var(--text);
      padding: 0.85rem 1rem 0.85rem 2.8rem;
      font-family: 'Lora', Georgia, serif;
      font-size: 1.05rem;
      font-style: italic; 
      width: 260px;
      outline: none;
      background: var(--surface);
    }

    .archive-search::placeholder {
      color: var(--muted);
      opacity: 0.6;
      font-weight: 400;
    }

    .archive-search:hover {
      border-color: rgba(212, 140, 112, 0.4); 
    }

    .archive-search:focus {
      width: 320px; 
      background: var(--card-bg);
      border-color: var(--accent);
      box-shadow: 0 10px 30px rgba(45, 36, 30, 0.08); 
      transform: translateY(-1px);
    }

    [data-theme="dark"] .archive-search:focus {
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
    }

    .tally {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* ═══════════════════════════════════════
       CUSTOM DROPDOWN MENUS
    ═══════════════════════════════════════ */
    .dropdown-wrapper {
      position: relative;
      display: inline-block;
    }

    .chip {
      background: var(--surface);
      border: 1px solid var(--border);
      transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1); 
      color: var(--text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
    }

    .chip:hover, .dropdown-wrapper.active .chip {
      background: var(--card-bg);
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-1px);
    }

    .icon-chip {
      padding: 0.85rem; 
      border-radius: 50%;
    }

    .dropdown-menu {
      position: absolute;
      top: calc(100% + 0.6rem);
      right: 0;
      left: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(45, 36, 30, 0.08);
      min-width: 170px;
      z-index: 100;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-10px);
      transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .dropdown-wrapper.active .dropdown-menu {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .dropdown-item {
      padding: 0.85rem 1.25rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text);
      background: transparent;
      border: none;
      text-align: left;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      white-space: normal;
      line-height: 1.4;
    }

    .dropdown-item:hover {
      background: var(--card-bg);
      color: var(--accent);
    }

    .dropdown-item.selected {
      background: var(--card-bg);
      color: var(--accent);
      position: relative;
    }

    .dropdown-item.selected::before {
      content: '•';
      position: absolute;
      left: 0.5rem;
      color: var(--accent);
    }

    [data-theme="dark"] .dropdown-menu {
       box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
    }

    /* ═══════════════════════════════════════
       ARTICLE ROWS
    ═══════════════════════════════════════ */
    .articles-list {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .post-row {
      display: grid;
      grid-template-columns: 140px 1fr 40px;
      align-items: center;
      gap: 2rem;
      padding: 2rem;
      text-decoration: none;
      color: inherit;
      background: var(--surface); 
      border: 1px solid var(--border);
      border-radius: 12px;
      transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      opacity: 0;
      transform: translateY(10px);
      animation: rowIn 0.5s ease forwards;
    }

    .post-row:hover {
      background: var(--card-bg); 
      border-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 15px 45px rgba(45, 36, 30, 0.08);
    }

    [data-theme="dark"] .post-row:hover {
      box-shadow: 0 15px 45px rgba(0, 0, 0, 0.4);
    }

    .row-meta {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .row-chapter {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .row-date {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
    }

    /* ═══════════════════════════════════════
       STATUS BADGES & UPDATED ROW TITLE
    ═══════════════════════════════════════ */
    .row-title {
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--dark);
      margin: 0 0 0.4rem 0;
      display: flex;
      align-items: center;
      flex-wrap: wrap; 
    }

    .status-badge {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.25em 0.6em;
      border-radius: 6px;
      margin-left: 0.75rem;
      vertical-align: middle;
      position: relative;
      display: inline-block;
      line-height: 1;
    }

    .status-draft {
      background: color-mix(in srgb, var(--muted) 12%, var(--bg));
      color: var(--muted);
      border: 1px solid color-mix(in srgb, var(--muted) 20%, transparent);
    }

    .row-desc {
      font-size: 0.95rem;
      color: var(--muted);
      margin: 0;
    }

    .row-arrow {
      text-align: right;
      color: var(--border);
      font-size: 1.2rem;
      transition: color 0.3s, transform 0.3s;
    }

    .post-row:hover .row-arrow {
      color: var(--accent);
      transform: translateX(5px);
    }

    @keyframes rowIn  { to { opacity: 1; transform: none; } }

    /* ═══════════════════════════════════════
       PROGRESS MODAL
    ═══════════════════════════════════════ */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: color-mix(in srgb, var(--bg) 85%, transparent);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal-window {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 90%;
      max-width: 500px;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 25px 50px rgba(0,0,0,0.1);
      transform: translateY(20px) scale(0.98);
      transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }

    [data-theme="dark"] .modal-window { box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
    .modal-overlay.active .modal-window { transform: translateY(0) scale(1); }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .modal-title {
      margin: 0;
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .modal-body {
      padding: 1.5rem;
      overflow-y: auto;
    }

    .month-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 0;
      border-bottom: 1px dashed var(--border);
    }

    .month-row:last-child { border-bottom: none; }

    .month-label {
      font-weight: 500;
      font-size: 1.05rem;
    }

    .month-stats {
      text-align: right;
      font-family: 'DM Mono', monospace;
    }

    .stat-words {
      font-size: 1rem;
      color: var(--accent);
      font-weight: 500;
    }

    .stat-details {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 0.2rem;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .layout { padding: 3rem 1.5rem; }
      .post-row { grid-template-columns: 1fr; padding: 1.5rem; gap: 1rem; }
      .row-arrow { display: none; }
      
      .controls-left { 
        width: 100%; 
        flex-wrap: nowrap; 
        gap: 0.5rem; 
      }
      
      .search-wrap { 
        flex: 1; 
        min-width: 0; 
      }
      
      .archive-search { 
        width: 100%; 
      }
      
      .archive-search:focus { 
        width: 100%; 
        transform: none; 
      }
      
      .dropdown-menu {
        max-width: calc(100vw - 3rem);
      }
    }
  </style>

</head>

<body>

  <div id="global-nav" data-root="../" data-sticky="true"></div>
  
  <main class="layout">
    <div class="content">
      <div class="controls">
        <div class="controls-left">
          <div class="search-wrap">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input id="articleSearch" class="archive-search" type="text" placeholder="Search dots..." autocomplete="off" />
          </div>
          
          <div class="dropdown-wrapper" id="filterDropdown">
            <button id="filterToggle" class="chip icon-chip" aria-label="Filter Categories">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
              </svg>
            </button>
            <div class="dropdown-menu" id="filterMenu"></div>
          </div>

          <div class="dropdown-wrapper" id="sortDropdown">
            <button id="sortToggle" class="chip icon-chip" aria-label="Sort Order">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <polyline points="19 12 12 19 5 12"></polyline>
              </svg>
            </button>
            <div class="dropdown-menu" id="sortMenu"></div>
          </div>
        </div>
        
        <div style="display: flex; align-items: center; gap: 1rem;">
          <span class="tally" id="tally"></span>
          
          <button id="progressBtn" class="chip icon-chip" aria-label="View Progress" title="Monthly Progress">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 3v18h18"/>
              <path d="M18 17V9"/>
              <path d="M13 17V5"/>
              <path d="M8 17v-3"/>
            </svg>
          </button>
        </div>
      </div>

      <section id="articlesList" class="articles-list"></section>
    </div>
  </main>

  <div id="progressModal" class="modal-overlay">
    <div class="modal-window">
      <div class="modal-header">
        <h3 class="modal-title">Writing Velocity</h3>
        <button id="closeModal" class="chip icon-chip" aria-label="Close">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="modal-body" id="monthlyStatsContainer">
        </div>
    </div>
  </div>

  <script src="../js/base.js"></script>
  <script src="../js/components.js"></script>
  <script src="../builder/dots-data.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const list        = document.getElementById("articlesList");
      const searchInput = document.getElementById("articleSearch");
      const tallyEl     = document.getElementById("tally");
      
      const filterMenu   = document.getElementById("filterMenu");
      const sortMenu     = document.getElementById("sortMenu");
      const filterToggle = document.getElementById("filterToggle");
      const sortToggle   = document.getElementById("sortToggle");

      const demo = [
        { title:"Eigenvectors and Diagonalisation",   description:"How to find eigenvectors and eigenvalues, and how to diagonalise matrices.", date:"2026-04-04", chapter:"Linear Algebra", readingTime:2, url:"#", keywords:"eigenvector eigenvalue matrix" },
        { title:"Vector Spaces & Subspaces",           description:"The formal structure behind vectors — what makes a space, and how subspaces carve it up.", date:"2026-04-04", chapter:"Linear Algebra", readingTime:7, url:"#", keywords:"vector space basis null" },
        { title:"Word Representation",                description:"From one-hot to dense embeddings: how language becomes geometry.", date:"2026-04-04", chapter:"Autoregressive Models", readingTime:13, url:"#", keywords:"embedding nlp word2vec" },
        { title:"Position Representation",            description:"How positions are encoded in the same vector space as embeddings.", date:"2026-04-03", chapter:"Autoregressive Models", readingTime:8, url:"#", keywords:"positional encoding rope transformer" }
      ];

      const articles  = (window.rawPages && window.rawPages.length) ? [...window.rawPages] : demo;
      const chapters  = ["all", ...new Set(articles.map(a => a.chapter).filter(Boolean))];
      
      const sortModes  = ["recent", "oldest", "az", "za", "chapter"];
      const sortLabels = ["Recent", "Oldest", "A–Z", "Z–A", "Chapter"];
      
      let chIdx = 0, sortIdx = 0;

      function renderDropdowns() {
        filterMenu.innerHTML = chapters.map((ch, i) => `
          <button class="dropdown-item ${i === chIdx ? 'selected' : ''}" data-idx="${i}">
            ${ch === "all" ? "All Categories" : ch}
          </button>
        `).join("");

        sortMenu.innerHTML = sortModes.map((mode, i) => `
          <button class="dropdown-item ${i === sortIdx ? 'selected' : ''}" data-idx="${i}">
            ${sortLabels[i]}
          </button>
        `).join("");
      }

      function closeAllDropdowns() {
        document.querySelectorAll('.dropdown-wrapper').forEach(w => w.classList.remove('active'));
      }

      filterToggle.addEventListener('click', (e) => {
        e.stopPropagation();
        const wrapper = filterToggle.closest('.dropdown-wrapper');
        const isActive = wrapper.classList.contains('active');
        closeAllDropdowns();
        if (!isActive) wrapper.classList.add('active');
      });

      sortToggle.addEventListener('click', (e) => {
        e.stopPropagation();
        const wrapper = sortToggle.closest('.dropdown-wrapper');
        const isActive = wrapper.classList.contains('active');
        closeAllDropdowns();
        if (!isActive) wrapper.classList.add('active');
      });

      document.addEventListener('click', closeAllDropdowns);

      filterMenu.addEventListener('click', (e) => {
        if (e.target.classList.contains('dropdown-item')) {
          chIdx = parseInt(e.target.dataset.idx);
          renderDropdowns(); 
          updateUI();
        }
      });

      sortMenu.addEventListener('click', (e) => {
        if (e.target.classList.contains('dropdown-item')) {
          sortIdx = parseInt(e.target.dataset.idx);
          renderDropdowns();
          updateUI();
        }
      });

      function score(a, q) {
        let s = 0;
        if ((a.title   ||"").toLowerCase().includes(q)) s += 5;
        if ((a.keywords||"").toLowerCase().includes(q)) s += 3;
        if ((a.chapter ||"").toLowerCase().includes(q)) s += 2;
        return s;
      }

      function render(items) {
        if (!items.length) {
          list.innerHTML = `<p style="padding: 3rem 0; font-style: italic; color: var(--muted); opacity: 0.7; text-align: center;">No dots match your search.</p>`;
          return;
        }
        
        list.innerHTML = items.map((a, i) => {
          const status = (a.status || 'draft').toLowerCase();
          const statusBadge = status === 'draft' 
            ? `<span class="status-badge status-draft">Draft</span>` 
            : '';

          return `
            <a class="post-row" href="${a.url||'#'}" style="animation-delay:${i*0.05}s">
              <div class="row-meta">
                <span class="row-chapter">${a.chapter||''}</span>
                <span class="row-date">${new Date(a.date).toLocaleDateString('en-GB', {day:'numeric', month:'short', year:'numeric', timeZone:'UTC'})}</span>
              </div>
              <div class="row-body">
                <div class="row-title">
                  ${a.title}
                  ${statusBadge}
                </div>
                <div class="row-desc">${a.description}</div>
              </div>
              <div class="row-arrow">→</div>
            </a>
          `;
        }).join("");
      }

      function updateUI() {
        const q  = searchInput.value.trim().toLowerCase();
        const ch = chapters[chIdx];
        let out  = articles.filter(a => (!q || score(a,q)>0) && (ch==="all" || a.chapter===ch));
        
        if (q) {
          out.sort((a,b) => score(b,q) - score(a,q));
        } else {
          switch (sortModes[sortIdx]) {
            case "recent":  out.sort((a,b)=>new Date(b.date)-new Date(a.date)); break;
            case "oldest":  out.sort((a,b)=>new Date(a.date)-new Date(b.date)); break;
            case "az":      out.sort((a,b)=>a.title.localeCompare(b.title));    break;
            case "za":      out.sort((a,b)=>b.title.localeCompare(a.title));    break;
            case "chapter": out.sort((a,b)=>(a.chapter||"").localeCompare(b.chapter||"")||a.title.localeCompare(b.title)); break;
          }
        }
        
        tallyEl.textContent = `${out.length} dot${out.length !== 1 ? "s" : ""}`;
        render(out);
      }

      searchInput.addEventListener("input", updateUI);
      renderDropdowns();
      updateUI();

      // --- Monthly Progress Logic ---
      const progressBtn = document.getElementById("progressBtn");
      const progressModal = document.getElementById("progressModal");
      const closeModal = document.getElementById("closeModal");
      const statsContainer = document.getElementById("monthlyStatsContainer");

      function generateMonthlyStats() {
        const months = {};

        articles.forEach(a => {
          const d = new Date(a.date);
          const monthKey = d.toLocaleString('en-US', { month: 'long', year: 'numeric' });
          const sortKey = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;

          if (!months[sortKey]) {
            months[sortKey] = { label: monthKey, time: 0, total: 0, drafts: 0 };
          }
          
          months[sortKey].time += (a.readingTime || 0);
          months[sortKey].total += 1;
          if ((a.status || 'draft').toLowerCase() === 'draft') months[sortKey].drafts += 1;
        });

        const sortedKeys = Object.keys(months).sort((a, b) => b.localeCompare(a));
        
        if (sortedKeys.length === 0) {
          statsContainer.innerHTML = `<p style="color:var(--muted); text-align:center; font-style:italic;">No data available yet.</p>`;
          return;
        }

        let html = '';
        sortedKeys.forEach(k => {
          const m = months[k];
          const words = m.time * 238; 
          const published = m.total - m.drafts;
          
          html += `
            <div class="month-row">
              <div class="month-label">${m.label}</div>
              <div class="month-stats">
                <div class="stat-words">~${words.toLocaleString()} words</div>
                <div class="stat-details">${m.total} dots (${published} pub, ${m.drafts} drf)</div>
              </div>
            </div>
          `;
        });

        statsContainer.innerHTML = html;
      }

      progressBtn.addEventListener('click', () => {
        generateMonthlyStats();
        progressModal.classList.add('active');
      });

      closeModal.addEventListener('click', () => {
        progressModal.classList.remove('active');
      });

      progressModal.addEventListener('click', (e) => {
        if (e.target === progressModal) progressModal.classList.remove('active');
      });

    });
  </script>
</body>
