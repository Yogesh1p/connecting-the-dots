    <div class="studio-workspace" id="studio-view">
        <textarea class="code-pane" id="source-editor"></textarea>
        <div class="preview-pane article-body" id="live-preview"></div>
        <div class="studio-controls">
            <button class="studio-fab" id="btn-save" style="position: static;">Save to File</button>
            <button class="studio-fab" id="btn-exit" style="position: static; background: #666;">Exit Studio</button>
        </div>
    </div>
    <button id="btn-edit" class="studio-fab">Open Studio</button>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const btnEdit = document.getElementById('btn-edit');
            const btnExit = document.getElementById('btn-exit');
            const btnSave = document.getElementById('btn-save');
            const standardView = document.getElementById('standard-view');
            const studioView = document.getElementById('studio-view');
            const sourceEditor = document.getElementById('source-editor');
            const livePreview = document.getElementById('live-preview');
            const mainContent = document.getElementById('main-content');
            let mathJaxTimeout; let pristineSource = "";

            try {
                const response = await fetch(window.location.href);
                const html = await response.text();
                const match = html.match(/(<section\s+class="article-body"[^>]*>)([\s\S]*?)(<\/section>)/i);
                pristineSource = match ? match[2] : mainContent.innerHTML;
            } catch (e) { pristineSource = mainContent.innerHTML; }

            btnEdit.addEventListener('click', () => {
                document.body.classList.add('studio-mode-active');
                standardView.style.display = 'none'; btnEdit.style.display = 'none';
                studioView.classList.add('is-active');
                sourceEditor.value = pristineSource.trim();
                updatePreview();
            });

            sourceEditor.addEventListener('input', () => {
                pristineSource = sourceEditor.value;
                livePreview.innerHTML = sourceEditor.value;
                clearTimeout(mathJaxTimeout);
                mathJaxTimeout = setTimeout(() => { if (window.MathJax) MathJax.typesetPromise([livePreview]); }, 500);
            });

            function updatePreview() {
                livePreview.innerHTML = sourceEditor.value;
                if (window.MathJax) MathJax.typesetPromise([livePreview]);
            }

            btnExit.addEventListener('click', () => {
                document.body.classList.remove('studio-mode-active');
                studioView.classList.remove('is-active');
                standardView.style.display = 'block'; btnEdit.style.display = 'block';
                mainContent.innerHTML = pristineSource;
                if (window.MathJax) MathJax.typesetPromise([mainContent]);
            });

            btnSave.addEventListener('click', async () => {
                btnSave.textContent = "Saving...";
                try {
                    const response = await fetch(window.location.href);
                    const rawSourceText = await response.text();
                    const regex = /(<section\s+class="article-body"[^>]*>)([\s\S]*?)(<\/section>)/i;
                    
                    // Simple string concatenation protects against template literal breakages
                    const finalHtml = rawSourceText.replace(regex, "$1\n" + pristineSource + "\n$3");
                    
                    if ('showSaveFilePicker' in window) {
                        const handle = await window.showSaveFilePicker({ suggestedName: location.pathname.split('/').pop() });
                        const writable = await handle.createWritable();
                        await writable.write(finalHtml);
                        await writable.close();
                        btnSave.textContent = "Saved!";
                        setTimeout(() => btnSave.textContent = "Save to File", 2000);
                    }
                } catch (err) {
                    alert("Save failed. Are you using VS Code Live Server?");
                } finally { if(btnSave.textContent === "Saving...") btnSave.textContent = "Save to File"; }
            });
        });
    </script>
