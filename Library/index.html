<style>
  /* Base Variables Fallback */

  .book-switcher {
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    margin: 0 0 3rem; 
    flex-wrap: wrap;
  }

  .book-tab {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 0.45em 1.1em;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
  }

  .book-tab:hover { border-color: var(--accent); color: var(--accent); }
  .book-tab.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }
  .book-tab.coming-soon { opacity: 0.45; cursor: default; pointer-events: none; }

  /* --- Main Content Layout --- */
  .book-panel { display: block; }

  .toc-book-header {
    margin-bottom: 2rem;
    padding-bottom: 2rem;
    border-bottom: 1px solid var(--border);
  }

  .toc-book-eyebrow {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.6rem;
  }

  .title-dropdown-wrapper { position: relative; display: inline-block; max-width: 100%; }

  .toc-book-title {
    font-size: clamp(2.4rem, 5vw, 3rem);
    font-weight: 400;
    color: var(--dark);
    margin: 0 0 0.5rem;
    letter-spacing: -0.035em;
    line-height: 1.05;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    outline: none;
  }

  .title-dropdown-arrow {
    display: none; 
    width: clamp(24px, 4vw, 32px); 
    height: clamp(24px, 4vw, 32px);
    color: var(--muted);
    transition: transform 0.3s ease;
    flex-shrink: 0;
  }

  .book-dropdown-menu { display: none; }
  .dropdown-item {
    display: block; width: 100%; text-align: left; padding: 0.85rem 1.2rem;
    font-family: inherit; font-size: 1rem; color: var(--text); background: none;
    border: none; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s, color 0.15s;
  }
  .dropdown-item:last-child { border-bottom: none; }
  .dropdown-item:hover:not(.coming-soon) { background: var(--highlight); color: var(--accent); }
  .dropdown-item.active { background: color-mix(in srgb, var(--accent) 8%, var(--bg)); color: var(--accent); font-weight: 600; }
  .dropdown-item.coming-soon { opacity: 0.4; cursor: default; font-style: italic; }

  .toc-book-desc {
    font-size: 1.15rem; color: var(--muted); font-style: italic; line-height: 1.75; max-width: 680px; margin: 0.5rem 0 0 0;
  }

  /* --- Transmorphic Search & Hero Styling --- */
  .book-progress-hero {
    display: inline-flex;
    align-items: center;
    gap: 2rem;
    margin-top: 2rem;
    padding: 0.85rem 1.25rem;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: color-mix(in srgb, var(--surface) 96%, var(--accent) 1%);
    box-sizing: border-box;
    min-height: 68px; /* Prevents hero from jumping when search expands */
  }

 /* Base element transitions */
  .book-progress-hero,
  .progress-num,
  .progress-label,
  .expandable-search-wrapper,
  .expandable-search,
  .search-input {
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* Staggered transition for stats */
  .progress-stat {
    display: flex;
    flex-direction: column;
    gap: 0.15rem;
    min-width: 90px;
    /* Prevent crowding/jumping during width animations */
    white-space: nowrap; 
    overflow: hidden;
    /* FADE IN DELAY: Wait 0.15s before showing stats when search closes */
    transition: opacity 0.3s ease 0.15s, transform 0.3s ease 0.15s; 
  }

  /* Active Hero styling on transmorph */
  .book-progress-hero.search-active .progress-stat {
    opacity: 0;
    transform: scale(0.85); /* Slightly deeper scale down */
    pointer-events: none; 
    /* FADE OUT INSTANTLY: Hide stats immediately when search opens */
    transition: opacity 0.15s ease 0s, transform 0.15s ease 0s; 
  }

  .progress-num { font-size: 1.7rem; font-weight: 500; color: var(--dark); line-height: 1; }
  .progress-label { font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }

  /* Apply borders only between the specific elements */
  .progress-stat:nth-child(1),
  .progress-stat:nth-child(2) {
    padding-right: 2rem;
    border-right: 1px solid var(--border);
  }

  .progress-stat:nth-child(3) {
    padding-right: 2rem;
    border-right: 1px solid var(--border); /* Acts as separator for the search icon */
  }

  .expandable-search-wrapper {
    display: flex;
    align-items: center;
  }

  .expandable-search {
    position: relative;
    display: flex;
    align-items: center;
    width: 42px; /* Starts as a circle */
    height: 42px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 21px; /* Half of height to make it pill-shaped */
    overflow: hidden;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.2s, box-shadow 0.2s, background 0.2s;
  }

  .expandable-search.is-open {
    width: 260px; /* Expands to full width */
    background: var(--bg);
    border-color: var(--accent);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 15%, transparent);
  }

  .search-icon {
    position: absolute;
    left: 11px;
    width: 18px;
    height: 18px;
    color: var(--muted);
    cursor: pointer;
    z-index: 2;
    transition: color 0.2s;
  }

  .expandable-search.is-open .search-icon {
    color: var(--accent);
    cursor: default; /* Remove pointer cursor when open */
  }

  .search-input {
    width: 100%;
    height: 100%;
    padding: 0 1.25rem 0 40px; /* Make room for the icon */
    border: none;
    background: transparent;
    color: var(--text);
    font-size: 0.95rem;
    font-family: inherit;
    outline: none;
    opacity: 0;
    pointer-events: none; /* Disable interaction when collapsed */
    transition: opacity 0.2s 0.1s; /* Slight delay so it doesn't clip during expansion */
  }

  .expandable-search.is-open .search-input {
    opacity: 1;
    pointer-events: auto;
  }

  .search-input::placeholder { color: color-mix(in srgb, var(--muted) 60%, transparent); }

  .search-results-meta {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    margin-bottom: 1rem;
    display: none;
  }

  /* --- TOC Blocks --- */
  .toc-block {
    border: 1px solid var(--border); border-radius: 14px; margin: 1.25rem 0;
    overflow: hidden; transition: border-color 0.2s ease, box-shadow 0.2s ease; background: var(--bg);
  }
  .toc-block:hover { border-color: color-mix(in srgb, var(--accent) 45%, var(--border)); box-shadow: var(--shadow-sm); }
  .toc-block > summary {
    display: flex; align-items: center; gap: 1rem; padding: 1.35rem 1.6rem;
    background: color-mix(in srgb, var(--surface) 92%, var(--accent) 3%); cursor: pointer; list-style: none; user-select: none;
  }
  .toc-block > summary::-webkit-details-marker { display: none; }
  .ch-summary-title { font-size: 1.15rem; font-weight: 600; color: var(--dark); flex: 1; letter-spacing: -0.02em; line-height: 1.2; }
  .ch-summary-count {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 0.72rem; color: var(--muted);
    background: var(--bg); border: 1px solid var(--border); padding: 0.25em 0.75em; border-radius: 999px; white-space: nowrap;
  }
  .ch-summary-arrow { width: 16px; height: 16px; color: var(--accent); transition: transform 0.25s ease; flex-shrink: 0; }
  details[open] .ch-summary-arrow { transform: rotate(90deg); }

  .toc-section-group { padding: 0.5rem 0 0.9rem; }
  .toc-part {
    margin: 1.2rem 1.6rem 0.6rem; font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 0.7rem;
    font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); display: flex; align-items: center; gap: 1rem;

  .deep-dive-section {
    margin-top: 1rem;
    padding-top: 0.5rem;

<script>
// Prevent native browser scrolling from overriding our script
if ('history' in window && 'scrollRestoration' in history) {
  history.scrollRestoration = 'manual';
}

const BOOK_CONFIG = {
  generative: {
    eyebrow: "Connecting the Dots ",
    title: "Generative Models",
    description: "Explicit likelihoods, latent variables, and modern generative architectures — with interactive visualisations at every step."
  },
  "linear-algebra": {
    eyebrow: "Connecting the Dots ",
    title: "Linear Algebra",
    description: "Vectors, matrix transformations, eigenspaces, and the geometry behind modern machine learning. To build intuition, drawing heavily from the lectures and books of Gilbert Strang."
  },
  Stats: {
    eyebrow: "Connecting the Dots ",
    title: "Stats",
    description: "Distributions, expected values, Bayes' theorem, and the statistical foundations of uncertainty."
  }
};

let activeBook = "generative"; 
let currentSearchQuery = ""; 

const bookMemory = JSON.parse(sessionStorage.getItem('bookMemory')) || {};

function saveCurrentBookState() {
  if (!activeBook || currentSearchQuery) return; 
  const openChapters = [];
  document.querySelectorAll('details.toc-block[open]').forEach(details => {
    openChapters.push(details.dataset.chapter);
  });
  bookMemory[activeBook] = { scrollY: window.scrollY, openChapters: openChapters };
  sessionStorage.setItem('bookMemory', JSON.stringify(bookMemory));
}

function restoreScrollState() {
  const state = bookMemory[activeBook];
  if (state && state.scrollY !== undefined && !currentSearchQuery) {
    // Force a synchronous DOM reflow so the browser calculates the 
    // physical height of the newly opened <details> tags instantly.
    void document.body.offsetHeight; 
    
    // Scroll instantly without the 50ms delay
    window.scrollTo({ top: state.scrollY, behavior: 'instant' }); 
  } else {
    window.scrollTo({ top: 0, behavior: 'instant' });
  }
}

// --- NEW: bfcache Handler ---
// This ensures scroll state is restored when the user hits the "Back" button
// and the browser serves the page from memory instead of reloading it.
window.addEventListener('pageshow', (event) => {
  if (event.persisted) {
    restoreScrollState();
  }
});

document.addEventListener("DOMContentLoaded", () => {
  const params = new URLSearchParams(window.location.search);
  const urlBook = params.get('book');
  const savedBook = localStorage.getItem('libraryActiveBook');
  
  if (urlBook && BOOK_CONFIG[urlBook]) { activeBook = urlBook; localStorage.setItem('libraryActiveBook', activeBook); } 
  else if (savedBook && BOOK_CONFIG[savedBook]) {
    activeBook = savedBook;
    const url = new URL(window.location); url.searchParams.set('book', activeBook); window.history.replaceState({}, '', url);
  }
  
  const dropdownWrapper = document.getElementById('bookDropdown');
  const dropdownTrigger = dropdownWrapper.querySelector('.book-dropdown-trigger');
  const currentBookNameLabel = document.getElementById('currentBookName');
  const allSelectableBooks = document.querySelectorAll('.book-tab[data-book], .dropdown-item[data-book]');
  
  // --- Transmorphic Search Logic ---
  const searchContainer = document.getElementById('searchContainer');
  const searchIcon = document.getElementById('searchIconTrigger');
  const searchInput = document.getElementById('librarySearch');
  const searchResultsMeta = document.getElementById('searchResultsMeta');

  // Open search on icon click
  searchIcon.addEventListener('click', () => {
    searchContainer.classList.add('is-open');
    searchInput.focus();
  });

  // Close search if clicked outside and empty
  searchInput.addEventListener('blur', () => {
    if (searchInput.value.trim() === "") {
      searchContainer.classList.remove('is-open');
      currentSearchQuery = "";
      buildLibrary(activeBook);
    }
  });

  function syncUI(bookKey) {
    const config = BOOK_CONFIG[bookKey];
    if (!config) return;
    currentBookNameLabel.textContent = config.title;
    allSelectableBooks.forEach(el => {
      if (el.dataset.book === bookKey) el.classList.add('active');
      else el.classList.remove('active');
    });
  }

  allSelectableBooks.forEach(button => {
    button.addEventListener('click', () => {
      const targetBook = button.dataset.book;
      if (targetBook === activeBook) return; 
      saveCurrentBookState(); 
      activeBook = targetBook;
      syncUI(activeBook);
      localStorage.setItem('libraryActiveBook', activeBook);
      const url = new URL(window.location); url.searchParams.set('book', activeBook); window.history.pushState({}, '', url);
      
      // Reset search on book switch
      searchInput.value = "";
      currentSearchQuery = "";
      searchContainer.classList.remove('is-open');
      
      buildLibrary(activeBook);
      restoreScrollState();
      if (button.classList.contains('dropdown-item')) {
        dropdownWrapper.classList.remove('open'); dropdownTrigger.setAttribute('aria-expanded', 'false');
      }
    });
  });

  dropdownTrigger.addEventListener('click', (e) => {
    if (window.innerWidth <= 640) {
      e.stopPropagation(); const isOpen = dropdownWrapper.classList.contains('open');
      dropdownWrapper.classList.toggle('open', !isOpen); dropdownTrigger.setAttribute('aria-expanded', !isOpen);
    }
  });

  document.addEventListener('click', (e) => {
    if (!dropdownWrapper.contains(e.target)) {
      dropdownWrapper.classList.remove('open'); dropdownTrigger.setAttribute('aria-expanded', 'false');
    }
  });

  searchInput.addEventListener('input', (e) => {
    currentSearchQuery = e.target.value.trim().toLowerCase();
    buildLibrary(activeBook);
  });

  const CHAPTER_ORDER = {
    "generative": ["Introduction", "Autoregressive Models", "Latent Variable Models", "Normalizing Flows", "Variational Autoencoders", "Generative Adversarial Networks", "Diffusion Models"],
    "linear-algebra": ["Solving Linear Systems", "Vector Spaces and Subspaces", "Orthogonality and Projections", "Determinants", "Eigenvalues and Eigenvectors", "Singular Value Decomposition"],
    "Stats": ["Foundations of Probability", "Distributions", "Statistical Inference", "Bayesian Thinking"],
  };

  const partPriority = { "Transformer Foundations": 0, "Large Language Models": 1, "Stats and Statistics Foundations": 0, "Main": 2 };

  function buildLibrary(book = activeBook) {
    const library = {};
    if (typeof window.rawPages === 'undefined') return; 
    
    let filteredPages = window.rawPages.filter(page => page.book === book);
    
    updateHero(book, filteredPages);

    if (currentSearchQuery) {
        filteredPages = filteredPages.filter(page => {
            return (page.title && page.title.toLowerCase().includes(currentSearchQuery)) ||
                   (page.description && page.description.toLowerCase().includes(currentSearchQuery)) ||
                   (page.chapter && page.chapter.toLowerCase().includes(currentSearchQuery)) ||
                   (page.keywords && page.keywords.toLowerCase().includes(currentSearchQuery));
        });
        
        searchResultsMeta.style.display = 'block';
        searchResultsMeta.textContent = `Found ${filteredPages.length} result${filteredPages.length !== 1 ? 's' : ''}`;
    } else {
        searchResultsMeta.style.display = 'none';
    }

    filteredPages.forEach(page => {
      if (!library[page.chapter]) library[page.chapter] = {};
      const part = page.part?.trim() || "Main";
      if (!library[page.chapter][part]) library[page.chapter][part] = [];
      library[page.chapter][part].push(page);
    });

    renderLibrary(library, !!currentSearchQuery);
  }

  function renderLibrary(library, isSearching) {
    const container = document.getElementById("library-content");
    let html = "";
    const chapterList = CHAPTER_ORDER[activeBook] || [];
    const currentState = bookMemory[activeBook] || { openChapters: [] };

    const chapters = Object.keys(library);
    
    if (chapters.length === 0) {
        container.innerHTML = `<div class="empty-state">No lessons found matching your search.</div>`;
        return;
    }

    chapters.sort((a, b) => {
        const ai = chapterList.indexOf(a);
        const bi = chapterList.indexOf(b);
        return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
      })
      .forEach(chapter => {
        const parts = library[chapter];
        let coreRowsHtml = "";
        let deepDiveRowsHtml = "";
        let totalSections = 0;

        Object.keys(parts)
          .sort((a, b) => (partPriority[a] ?? 999) - (partPriority[b] ?? 999))
          .forEach(part => {
            if (part !== "Main" && part !== "undefined" && part.trim()) {
              const partHeader = `<div class="toc-part">${part}</div>`;
              coreRowsHtml += partHeader; 
            }

            parts[part]
              .sort((a, b) => (a.lessonorder ?? 999) - (b.lessonorder ?? 999))
              .forEach(page => {
                totalSections++;
                const status = (page.status || 'draft').toLowerCase();
                const statusBadge = status === 'draft' ? `<span class="status-badge status-draft">Draft</span>` : '';
                
                let displayTitle = page.title;

                const rowHTML = `
                  <div class="toc-row ${page.tier === 'deep-dive' ? 'is-deep-dive' : ''}">
                    <a href="${page.url}">
                      <span class="row-title">${displayTitle} ${statusBadge}</span>
                    </a>
                  </div>
                `;

                if (page.tier === 'deep-dive') {
                    deepDiveRowsHtml += rowHTML;
                } else {
                    coreRowsHtml += rowHTML;
                }
              });
          });

        if (deepDiveRowsHtml) {
            deepDiveRowsHtml = `
              <div class="deep-dive-section">
                <div class="deep-dive-header">Supplementary & Deep Dives</div>
                ${deepDiveRowsHtml}
              </div>
            `;
        }

        const isOpen = (isSearching || currentState.openChapters.includes(chapter)) ? "open" : "";

        html += `
          <details class="toc-block" data-chapter="${chapter}" ${isOpen}>
            <summary>
              <span class="ch-summary-title">${chapter}</span>
              <span class="ch-summary-count">${totalSections} Lessons</span>
              <svg class="ch-summary-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6"></polyline>
              </svg>
            </summary>
            <div class="toc-section-group">
              ${coreRowsHtml}
              ${deepDiveRowsHtml}
            </div>
          </details>
        `;
      });

    container.innerHTML = html;
  }

  function updateHero(book, pages) {
    const config = BOOK_CONFIG[book];
    document.querySelector(".toc-book-eyebrow").textContent = config.eyebrow;
    document.querySelector(".toc-book-desc").textContent = config.description;
    document.getElementById("lessonCount").textContent = pages.length;
    const chapters = new Set(pages.map(p => p.chapter)).size;
    document.getElementById("chapterCount").textContent = chapters;
    const totalMinutes = pages.reduce((sum, p) => sum + (p.readingTime || 0), 0);
    document.getElementById("readingPath").textContent =
      totalMinutes >= 60 ? `${(totalMinutes / 60).toFixed(1)}h` : `${totalMinutes}m`;
  }

  window.addEventListener("popstate", () => {
    saveCurrentBookState(); 
    const currentParams = new URLSearchParams(window.location.search);
    const poppedBook = currentParams.get('book') || localStorage.getItem('libraryActiveBook') || 'generative';
    
    if (BOOK_CONFIG[poppedBook]) {
      activeBook = poppedBook;
      localStorage.setItem('libraryActiveBook', activeBook);
      syncUI(activeBook);
      buildLibrary(activeBook);
      restoreScrollState(); 
    }
  });

  document.getElementById('library-content').addEventListener('click', (e) => {
    if (e.target.closest('a')) saveCurrentBookState();
  });

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'hidden') saveCurrentBookState();
  });

  syncUI(activeBook);
  buildLibrary();
  restoreScrollState();
});
</script>
</body>
</html>
