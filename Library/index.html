<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contents · Connecting the Dots</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../css/base.css">

<style>
 .book-switcher {
  display: flex;
  justify-content: center;
  gap: 0.5rem;
  /* Changed from 3rem 0 2.5rem to 0 0 3rem */
  margin: 0 0 3rem; 
  flex-wrap: wrap;
}

  .book-tab {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 0.45em 1.1em;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
  }

  .book-tab:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .book-tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg);
  }

  .book-tab.coming-soon {
    opacity: 0.45;
    cursor: default;
    pointer-events: none;
  }

  /* --- Main Content Layout --- */
  .book-panel { display: block; }

  .toc-book-header {
    margin-bottom: 2.5rem;
    padding-bottom: 2rem;
    border-bottom: 1px solid var(--border);
  }

  .toc-book-eyebrow {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.6rem;
  }

  /* --- Unified Title/Dropdown Wrapper --- */
  .title-dropdown-wrapper {
    position: relative; 
    display: inline-block; /* Hugs the text */
    max-width: 100%;
  }

  .toc-book-title {
    font-size: clamp(2.4rem, 5vw, 3rem);
    font-weight: 400;
    color: var(--dark);
    margin: 0 0 0.5rem;
    letter-spacing: -0.035em;
    line-height: 1.05;
    /* Flexbox allows the arrow to sit nicely next to the text */
    display: flex;
    align-items: center;
    gap: 0.5rem;
    outline: none;
  }

  .title-dropdown-arrow {
    display: none; /* Hidden on Desktop */
    width: clamp(24px, 4vw, 32px); 
    height: clamp(24px, 4vw, 32px);
    color: var(--muted);
    transition: transform 0.3s ease;
    flex-shrink: 0;
  }

  /* Dropdown Menu Base (Hidden completely on Desktop) */
  .book-dropdown-menu {
    display: none; 
  }

  .dropdown-item {
    display: block;
    width: 100%;
    text-align: left;
    padding: 0.85rem 1.2rem;
    font-family: inherit;
    font-size: 1rem;
    color: var(--text);
    background: none;
    border: none;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }

  .dropdown-item:last-child {
    border-bottom: none;
  }

  .dropdown-item:hover:not(.coming-soon) {
    background: var(--highlight);
    color: var(--accent);
  }

  .dropdown-item.active {
    background: color-mix(in srgb, var(--accent) 8%, var(--bg));
    color: var(--accent);
    font-weight: 600;
  }

  .dropdown-item.coming-soon {
    opacity: 0.4;
    cursor: default;
    font-style: italic;
  }

  /* --- Remaining Hero Styling --- */
  .toc-book-desc {
    font-size: 1.15rem;
    color: var(--muted);
    font-style: italic;
    line-height: 1.75;
    max-width: 680px;
    margin: 0.5rem 0 0 0; /* Added slight top margin since wrapper handles spacing */
  }

  .book-progress-hero {
    display: inline-grid;
    grid-template-columns: repeat(3, auto);
    gap: 2rem;
    margin-top: 2rem;
    padding: 1rem 1.25rem;
    border: 1px solid var(--border);
    border-radius: 18px;
    background: color-mix(in srgb, var(--surface) 96%, var(--accent) 1%);
  }

  .progress-stat:not(:last-child) {
    padding-right: 2rem;
    border-right: 1px solid var(--border);
  }

  .progress-stat {
    display: flex;
    flex-direction: column;
    gap: 0.15rem;
    min-width: 90px;
  }

  .progress-num {
    font-size: 1.7rem;
    font-weight: 500;
    color: var(--dark);
    line-height: 1;
  }

  .progress-label {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* --- TOC Blocks --- */
  .toc-block {
    border: 1px solid var(--border);
    border-radius: 14px;
    margin: 1.25rem 0;
    overflow: hidden;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
    background: var(--bg);
  }

  .toc-block:hover {
    border-color: color-mix(in srgb, var(--accent) 45%, var(--border));
    box-shadow: var(--shadow-sm);
  }

  .toc-block > summary {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1.35rem 1.6rem;
    background: color-mix(in srgb, var(--surface) 92%, var(--accent) 3%);
    cursor: pointer;
    list-style: none;
    user-select: none;
  }

  .toc-block > summary::-webkit-details-marker { display: none; }

  .ch-summary-title {
    font-size: 1.55rem;
    font-weight: 600;
    color: var(--dark);
    flex: 1;
    letter-spacing: -0.02em;
    line-height: 1.2;
  }

  .ch-summary-count {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 0.72rem;
    color: var(--muted);
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 0.25em 0.75em;
    border-radius: 999px;
  }

  .ch-summary-arrow {
    width: 16px;
    height: 16px;
    color: var(--accent);
    transition: transform 0.25s ease;
    flex-shrink: 0;
  }

  details[open] .ch-summary-arrow {
    transform: rotate(90deg);
  }

  .toc-section-group { padding: 0.5rem 0 0.9rem; }

  .toc-part {
    margin: 1.2rem 1.6rem 0.6rem;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .toc-part::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .toc-row {
    display: flex;
    align-items: baseline;
    gap: 0.7rem;
    padding: 0.7rem 2rem 0.7rem 2.8rem;
    transition: all 0.15s ease;
    border-left: 2px solid transparent;
  }

  .toc-row:hover {
    background: var(--highlight);
    border-left-color: var(--accent);
  }

  .toc-row a {
    display: contents;
    text-decoration: none;
    color: inherit;
  }

  .row-title {
    font-size: 1.08rem;
    color: var(--text);
    flex: 1;
    line-height: 1.55;
    font-weight: 400;
  }

  .toc-row:hover .row-title { color: var(--accent); }

 .toc-page {
  max-width: 820px;
  margin: 0 auto 6rem;
  /* Increased from 0.5rem */
  padding-top: 3.5rem; 
}

  .loading-state {
    text-align: center;
    padding: 4rem;
    color: var(--muted);
    font-style: italic;
  }

  /* --- Mobile Optimizations & Menu Handoff --- */
  @media (max-width: 640px) {
    /* Hide Tabs on Mobile */
    .book-switcher {
      display: none; 
    }

    /* Transform H1 into a clickable button */
    .toc-book-title {
      cursor: pointer;
      margin: 0; /* Remove bottom margin to keep menu tight */
    }

    /* Show Title Arrow */
    .title-dropdown-arrow {
      display: block; 
    }

    /* Activate and position the Mobile Menu */
    .book-dropdown-menu {
      display: block; 
      position: absolute;
      top: 100%;
      left: 0;
      width: clamp(280px, 90vw, 360px); /* Keeps it a reasonable size */
      margin-top: 0.5rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.15), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
      z-index: 50;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-10px);
      transition: opacity 0.2s, transform 0.2s, visibility 0.2s;
      overflow: hidden;
    }

    .title-dropdown-wrapper.open .book-dropdown-menu {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .title-dropdown-wrapper.open .title-dropdown-arrow {
      transform: rotate(180deg);
    }

    /* Adjust Hero Stats */
    .book-progress-hero {
      display: flex; 
      width: 100%;
      box-sizing: border-box;
      justify-content: space-between;
      gap: 0.5rem;
      padding: 1.25rem 1rem;
    }
    
    .progress-stat {
      min-width: auto;
      flex: 1; 
    }

    .progress-stat:not(:last-child) {
      padding-right: 0.5rem;
      padding-bottom: 0;
      border-right: 1px solid var(--border);
      border-bottom: none;
    }

    .progress-num { font-size: 1.4rem; }

    /* Adjust TOC Typography */
    .toc-book-title { font-size: 2.2rem; }
    .toc-block > summary { padding: 1rem; gap: 0.75rem; }
    .ch-summary-title { font-size: 1.25rem; }
    .toc-row { padding: 0.7rem 1rem 0.7rem 1.5rem; }
    .toc-page {
    padding-top: 2rem; /* Nice, balanced breathing room for mobile */
  }
  /* Add this to shrink the eyebrow text */
    .toc-book-eyebrow {
      font-size: 0.53rem;       /* Reduced from 0.7rem */
      letter-spacing: 0.15em;   /* Slightly tighter so it doesn't span too wide */
      margin-bottom: 0.4rem;    /* Pull it slightly closer to the title */
    }
  }
</style>
</head>
<body>

<div id="global-nav" data-root="../"></div>

<main class="page-wrap">
  <section class="toc-page">

    <nav class="book-switcher" aria-label="Book selection">
      <button class="book-tab" data-book="generative">Generative Models</button>
      <button class="book-tab" data-book="linear-algebra">Linear Algebra</button>
      <button class="book-tab coming-soon" disabled>Probability · soon</button>
    </nav>

    <div class="toc-book-header">
      <div class="toc-book-eyebrow">Connecting the Dots · Book I</div>
      
      <div class="title-dropdown-wrapper" id="bookDropdown">
        
        <h1 class="toc-book-title book-dropdown-trigger" tabindex="0" role="button" aria-haspopup="true" aria-expanded="false">
          <span id="currentBookName">Generative Models</span>
          <svg class="title-dropdown-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </h1>
        
        <div class="book-dropdown-menu" role="menu">
          <button class="dropdown-item" data-book="generative" role="menuitem">Generative Models</button>
          <button class="dropdown-item" data-book="linear-algebra" role="menuitem">Linear Algebra</button>
          <button class="dropdown-item coming-soon" role="menuitem" disabled>Probability · soon</button>
        </div>

      </div>

      <p class="toc-book-desc">
        Explicit likelihoods, latent variables, and modern generative architectures —
        with interactive visualisations at every step.
      </p>

      <div class="book-progress-hero" id="bookProgressHero">
        <div class="progress-stat">
          <span class="progress-num" id="lessonCount">—</span>
          <span class="progress-label">Lessons</span>
        </div>
        <div class="progress-stat">
          <span class="progress-num" id="chapterCount">—</span>
          <span class="progress-label">Chapters</span>
        </div>
        <div class="progress-stat">
          <span class="progress-num" id="readingPath">—</span>
          <span class="progress-label">Reading Path</span>
        </div>
      </div>
    </div>

    <div id="library-content">
      <div class="loading-state">Compiling Library...</div>
    </div>

  </section>
</main>
<footer>
  <p>&copy; 2026 Yogesh. Connecting the Dots.</p>
</footer>

<script src="../js/base.js"></script>
<script src="../js/components.js"></script>
<script src="../builder/lib-data.js"></script>

<script>
const BOOK_CONFIG = {
  generative: {
    eyebrow: "Connecting the Dots ",
    title: "Generative Models",
    description: "Explicit likelihoods, latent variables, and modern generative architectures — with interactive visualisations at every step."
  },
  "linear-algebra": {
    eyebrow: "Connecting the Dots ",
    title: "Linear Algebra",
    description: "Vectors, matrix transformations, eigenspaces, and the geometry behind modern machine learning."
  }
};

let activeBook = "generative"; // Default fallback

document.addEventListener("DOMContentLoaded", () => {
  
  // 1. Determine Initial State
  const params = new URLSearchParams(window.location.search);
  const urlBook = params.get('book');
  const savedBook = localStorage.getItem('libraryActiveBook');
  
  if (urlBook && BOOK_CONFIG[urlBook]) {
    activeBook = urlBook;
    localStorage.setItem('libraryActiveBook', activeBook);
  } else if (savedBook && BOOK_CONFIG[savedBook]) {
    activeBook = savedBook;
    const url = new URL(window.location);
    url.searchParams.set('book', activeBook);
    window.history.replaceState({}, '', url);
  }
  
  // 2. Setup Unified UI Elements
  const dropdownWrapper = document.getElementById('bookDropdown');
  const dropdownTrigger = dropdownWrapper.querySelector('.book-dropdown-trigger');
  const currentBookNameLabel = document.getElementById('currentBookName');
  const allSelectableBooks = document.querySelectorAll('.book-tab[data-book], .dropdown-item[data-book]');

  function syncUI(bookKey) {
    const config = BOOK_CONFIG[bookKey];
    if (!config) return;

    // Update H1 Text
    currentBookNameLabel.textContent = config.title;
    
    // Update active class on both Tabs AND Dropdown Items
    allSelectableBooks.forEach(el => {
      if (el.dataset.book === bookKey) {
        el.classList.add('active');
      } else {
        el.classList.remove('active');
      }
    });
  }

  // 3. Attach click listeners to ALL book buttons
  allSelectableBooks.forEach(button => {
    button.addEventListener('click', () => {
      activeBook = button.dataset.book;
      
      syncUI(activeBook);
      localStorage.setItem('libraryActiveBook', activeBook);
      
      const url = new URL(window.location);
      url.searchParams.set('book', activeBook);
      window.history.pushState({}, '', url);

      buildLibrary(activeBook);

      // Close dropdown if a dropdown item was clicked
      if (button.classList.contains('dropdown-item')) {
        dropdownWrapper.classList.remove('open');
        dropdownTrigger.setAttribute('aria-expanded', 'false');
      }
    });
  });

  // 4. Dropdown specific interactions (Mobile Only visually, but functional logic remains)
  dropdownTrigger.addEventListener('click', (e) => {
    // Only toggle if window is mobile width (prevents weird states if clicked on desktop)
    if (window.innerWidth <= 640) {
      e.stopPropagation();
      const isOpen = dropdownWrapper.classList.contains('open');
      dropdownWrapper.classList.toggle('open', !isOpen);
      dropdownTrigger.setAttribute('aria-expanded', !isOpen);
    }
  });

  document.addEventListener('click', (e) => {
    if (!dropdownWrapper.contains(e.target)) {
      dropdownWrapper.classList.remove('open');
      dropdownTrigger.setAttribute('aria-expanded', 'false');
    }
  });

  // 5. Library Rendering Functions
  const partPriority = {
    "Transformer Foundations": 0,
    "Large Language Models": 1,
    "Main": 2
  };

  function buildLibrary(book = activeBook) {
    const library = {};
    // Ensure rawPages is available from your lib-data.js script
    if (typeof rawPages === 'undefined') return; 
    
    const filteredPages = rawPages.filter(page => page.book === book);

    filteredPages.forEach(page => {
      if (!library[page.chapter]) {
        library[page.chapter] = {};
      }
      const part = page.part?.trim() || "Main";
      if (!library[page.chapter][part]) {
        library[page.chapter][part] = [];
      }
      library[page.chapter][part].push(page);
    });

    renderLibrary(library);
    updateHero(book, filteredPages);
  }

  function renderLibrary(library) {
    const container = document.getElementById("library-content");
    let html = "";

    Object.keys(library)
      .sort((a, b) => {
        const getMinOrder = chapter => Math.min(...Object.values(library[chapter]).flat().map(page => page.order ?? 999));
        return getMinOrder(a) - getMinOrder(b);
      })
      .forEach(chapter => {
        const parts = library[chapter];
        let rowsHtml = "";
        let totalSections = 0;

        Object.keys(parts)
          .sort((a, b) => (partPriority[a] ?? 999) - (partPriority[b] ?? 999))
          .forEach(part => {
            if (part !== "Main" && part !== "undefined" && part.trim()) {
              rowsHtml += `<div class="toc-part">${part}</div>`;
            }

            parts[part]
              .sort((a, b) => a.order - b.order)
              .forEach(page => {
                totalSections++;
                rowsHtml += `
                  <div class="toc-row">
                    <a href="${page.url}">
                      <span class="row-title">${page.title}</span>
                    </a>
                  </div>
                `;
              });
          });

        html += `
          <details class="toc-block" open>
            <summary>
              <span class="ch-summary-title">${chapter}</span>
              <span class="ch-summary-count">${totalSections} Lessons</span>
              <svg class="ch-summary-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6"></polyline>
              </svg>
            </summary>
            <div class="toc-section-group">
              ${rowsHtml}
            </div>
          </details>
        `;
      });

    container.innerHTML = html;
  }

  function updateHero(book, pages) {
    const config = BOOK_CONFIG[book];

    document.querySelector(".toc-book-eyebrow").textContent = config.eyebrow;
    // NOTE: We no longer update the H1 text directly here to avoid deleting the SVG arrow! 
    // `syncUI` safely updates the span inside the H1 instead.
    document.querySelector(".toc-book-desc").textContent = config.description;

    document.getElementById("lessonCount").textContent = pages.length;

    const chapters = new Set(pages.map(p => p.chapter)).size;
    document.getElementById("chapterCount").textContent = chapters;

    const totalMinutes = pages.reduce((sum, p) => sum + (p.readingTime || 0), 0);
    document.getElementById("readingPath").textContent =
      totalMinutes >= 60 ? `${(totalMinutes / 60).toFixed(1)}h` : `${totalMinutes}m`;
  }

  // Handle Browser Back/Forward buttons smoothly
  window.addEventListener("popstate", () => {
    const currentParams = new URLSearchParams(window.location.search);
    const poppedBook = currentParams.get('book') || localStorage.getItem('libraryActiveBook') || 'generative';
    
    if (BOOK_CONFIG[poppedBook]) {
      activeBook = poppedBook;
      localStorage.setItem('libraryActiveBook', activeBook);
      syncUI(activeBook);
      buildLibrary(activeBook);
    }
  });

  // Initialize UI and Build
  syncUI(activeBook);
  buildLibrary();
});
</script>
</body>
</html>
