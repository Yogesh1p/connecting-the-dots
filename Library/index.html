<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contents · Connecting the Dots</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../css/base.css">

<style>
  .book-switcher {
    display: flex;
    gap: 0.5rem;
    margin: 3rem 0 2.5rem;
    flex-wrap: wrap;
  }

  .book-tab {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 0.45em 1.1em;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
  }

  .book-tab:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .book-tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg);
  }

  .book-tab.coming-soon {
    opacity: 0.45;
    cursor: default;
    pointer-events: none;
  }

  .book-panel {
    display: block;
  }

  .toc-book-header {
    margin-bottom: 2.5rem;
    padding-bottom: 2rem;
    border-bottom: 1px solid var(--border);
  }

  .toc-book-eyebrow {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.6rem;
  }

  .toc-book-title {
    font-size: clamp(2.4rem, 5vw, 3rem);
    font-weight: 400;
    color: var(--dark);
    margin: 0 0 0.5rem;
    letter-spacing: -0.035em;
    line-height: 1.05;
    max-width: 760px;
  }

  .toc-book-desc {
    font-size: 1.15rem;
    color: var(--muted);
    font-style: italic;
    line-height: 1.75;
    max-width: 680px;
    margin: 0;
  }

  .book-progress-hero {
    display: inline-grid;
    grid-template-columns: repeat(3, auto);
    gap: 2rem;
    margin-top: 2rem;
    padding: 1rem 1.25rem;
    border: 1px solid var(--border);
    border-radius: 18px;
    background: color-mix(in srgb, var(--surface) 96%, var(--accent) 1%);
  }

  .progress-stat:not(:last-child) {
    padding-right: 2rem;
    border-right: 1px solid var(--border);
  }

  .progress-stat {
    display: flex;
    flex-direction: column;
    gap: 0.15rem;
    min-width: 90px;
  }

  .progress-num {
    font-size: 1.7rem;
    font-weight: 500;
    color: var(--dark);
    line-height: 1;
  }

  .progress-label {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .toc-block {
    border: 1px solid var(--border);
    border-radius: 14px;
    margin: 1.25rem 0;
    overflow: hidden;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
    background: var(--bg);
  }

  .toc-block:hover {
    border-color: color-mix(in srgb, var(--accent) 45%, var(--border));
    box-shadow: var(--shadow-sm);
  }

  .toc-block > summary {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1.35rem 1.6rem;
    background: color-mix(in srgb, var(--surface) 92%, var(--accent) 3%);
    cursor: pointer;
    list-style: none;
    user-select: none;
  }

  .toc-block > summary::-webkit-details-marker {
    display: none;
  }

  .ch-summary-title {
    font-size: 1.55rem;
    font-weight: 600;
    color: var(--dark);
    flex: 1;
    letter-spacing: -0.02em;
    line-height: 1.2;
  }

  .ch-summary-count {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 0.72rem;
    color: var(--muted);
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 0.25em 0.75em;
    border-radius: 999px;
  }

  .ch-summary-arrow {
    font-size: 0.7rem;
    color: var(--accent);
    transition: transform 0.25s ease;
  }

  details[open] .ch-summary-arrow {
    transform: rotate(90deg);
  }

  .toc-section-group {
    padding: 0.5rem 0 0.9rem;
  }

  .toc-part {
    margin: 1.2rem 1.6rem 0.6rem;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .toc-part::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .toc-row {
    display: flex;
    align-items: baseline;
    gap: 0.7rem;
    padding: 0.7rem 2rem 0.7rem 2.8rem;
    transition: all 0.15s ease;
    border-left: 2px solid transparent;
  }

  .toc-row:hover {
    background: var(--highlight);
    border-left-color: var(--accent);
  }

  .toc-row a {
    display: contents;
    text-decoration: none;
    color: inherit;
  }

  .row-title {
    font-size: 1.08rem;
    color: var(--text);
    flex: 1;
    line-height: 1.55;
    font-weight: 400;
  }

  .toc-row:hover .row-title {
    color: var(--accent);
  }

  .toc-page {
    max-width: 820px;
    margin: 0 auto 6rem;
    padding-top: 0.5rem;
  }

  .loading-state {
    text-align: center;
    padding: 4rem;
    color: var(--muted);
    font-style: italic;
  }
</style>
</head>
<body>

<div id="global-nav" data-root="../"></div>

<main class="page-wrap">
  <section class="toc-page">

    <nav class="book-switcher" aria-label="Book selection">
      <button class="book-tab" data-book="generative">
        Deep Generative Models
      </button>
      <button class="book-tab" data-book="linear-algebra">
        Linear Algebra
      </button>
      <button class="book-tab coming-soon">
        Probability · soon
      </button>
    </nav>

    <div class="toc-book-header">
      <div class="toc-book-eyebrow">Connecting the Dots · Book I</div>
      <h1 class="toc-book-title">Deep Generative Models</h1>
      <p class="toc-book-desc">
        Explicit likelihoods, latent variables, and modern generative architectures —
        with interactive visualisations at every step.
      </p>

      <div class="book-progress-hero" id="bookProgressHero">
        <div class="progress-stat">
          <span class="progress-num" id="lessonCount">—</span>
          <span class="progress-label">Lessons</span>
        </div>
        <div class="progress-stat">
          <span class="progress-num" id="chapterCount">—</span>
          <span class="progress-label">Chapters</span>
        </div>
        <div class="progress-stat">
          <span class="progress-num" id="readingPath">—</span>
          <span class="progress-label">Reading Path</span>
        </div>
      </div>
    </div>

    <div id="library-content">
      <div class="loading-state">Compiling Library...</div>
    </div>

  </section>
</main>

<footer>Connecting the Dots · Interactive Mathematical Textbooks</footer>

<script src="../js/base.js"></script>
<script src="../js/components.js"></script>
<script src="../builder/lib-data.js"></script>

<script>
const BOOK_CONFIG = {
  generative: {
    eyebrow: "Connecting the Dots ",
    title: "Deep Generative Models",
    description: "Explicit likelihoods, latent variables, and modern generative architectures — with interactive visualisations at every step."
  },
  "linear-algebra": {
    eyebrow: "Connecting the Dots ",
    title: "Linear Algebra",
    description: "Vectors, matrix transformations, eigenspaces, and the geometry behind modern machine learning."
  }
};

let activeBook = "generative"; // Default fallback

// Function to visually activate the correct tab
function setActiveTabUI(book) {
  document.querySelectorAll(".book-tab").forEach(t => t.classList.remove("active"));
  const activeTab = document.querySelector(`.book-tab[data-book="${book}"]`);
  if (activeTab) {
    activeTab.classList.add("active");
  }
}

document.addEventListener("DOMContentLoaded", () => {
  
  // 1. Determine Initial State: URL params win, then localStorage, then default
  const params = new URLSearchParams(window.location.search);
  const urlBook = params.get('book');
  const savedBook = localStorage.getItem('libraryActiveBook');
  
  if (urlBook && BOOK_CONFIG[urlBook]) {
    activeBook = urlBook;
    // Update local storage so if they click away from this shared link, it remembers
    localStorage.setItem('libraryActiveBook', activeBook);
  } else if (savedBook && BOOK_CONFIG[savedBook]) {
    activeBook = savedBook;
    
    // Optional: Update the URL to match the saved state right on load
    const url = new URL(window.location);
    url.searchParams.set('book', activeBook);
    window.history.replaceState({}, '', url);
  }
  
  // Visually set the correct tab before building
  setActiveTabUI(activeBook);

  const partPriority = {
    "Transformer Foundations": 0,
    "Large Language Models": 1,
    "Main": 2
  };

  function buildLibrary(book = activeBook) {
    const library = {};

    // Filter pages based on active book
    const filteredPages = rawPages.filter(page => page.book === book);

    filteredPages.forEach(page => {
      if (!library[page.chapter]) {
        library[page.chapter] = {};
      }
      
      const part = page.part?.trim() || "Main";
      
      if (!library[page.chapter][part]) {
        library[page.chapter][part] = [];
      }
      library[page.chapter][part].push(page);
    });

    renderLibrary(library);
    updateHero(book, filteredPages);
  }

  function renderLibrary(library) {
    const container = document.getElementById("library-content");
    let html = "";

    Object.keys(library)
      .sort((a, b) => {
        const getMinOrder = chapter =>
          Math.min(
            ...Object.values(library[chapter])
              .flat()
              .map(page => page.order ?? 999)
          );

        return getMinOrder(a) - getMinOrder(b);
      })
      .forEach(chapter => {
        const parts = library[chapter];
        let rowsHtml = "";
        let totalSections = 0;

        Object.keys(parts)
          .sort((a, b) => (partPriority[a] ?? 999) - (partPriority[b] ?? 999))
          .forEach(part => {
            if (part !== "Main" && part !== "undefined" && part.trim()) {
              rowsHtml += `<div class="toc-part">${part}</div>`;
            }

            parts[part]
              .sort((a, b) => a.order - b.order)
              .forEach(page => {
                totalSections++;
                rowsHtml += `
                  <div class="toc-row">
                    <a href="${page.url}">
                      <span class="row-title">${page.title}</span>
                    </a>
                  </div>
                `;
              });
          });

        html += `
          <details class="toc-block" open>
            <summary>
              <span class="ch-summary-title">${chapter}</span>
              <span class="ch-summary-count">${totalSections} Lessons</span>
              <span class="ch-summary-arrow">▶</span>
            </summary>
            <div class="toc-section-group">
              ${rowsHtml}
            </div>
          </details>
        `;
      });

    container.innerHTML = html;
  }

  function updateHero(book, pages) {
    const config = BOOK_CONFIG[book];

    document.querySelector(".toc-book-eyebrow").textContent = config.eyebrow;
    document.querySelector(".toc-book-title").textContent = config.title;
    document.querySelector(".toc-book-desc").textContent = config.description;

    document.getElementById("lessonCount").textContent = pages.length;

    const chapters = new Set(pages.map(p => p.chapter)).size;
    document.getElementById("chapterCount").textContent = chapters;

    const totalMinutes = pages.reduce((sum, p) => sum + (p.readingTime || 0), 0);

    document.getElementById("readingPath").textContent =
      totalMinutes >= 60
        ? `${(totalMinutes / 60).toFixed(1)}h`
        : `${totalMinutes}m`;
  }

  // Activate tab switching, update URL state, AND save to localStorage
  document.querySelectorAll(".book-tab[data-book]").forEach(tab => {
    tab.addEventListener("click", () => {
      activeBook = tab.dataset.book;
      
      setActiveTabUI(activeBook);

      // Save preference so it remembers for next time
      localStorage.setItem('libraryActiveBook', activeBook);

      // Update the URL without triggering a page reload
      const url = new URL(window.location);
      url.searchParams.set('book', activeBook);
      window.history.pushState({}, '', url);

      buildLibrary(activeBook);
    });
  });

  // Handle Browser Back/Forward buttons smoothly
  window.addEventListener("popstate", () => {
    const currentParams = new URLSearchParams(window.location.search);
    const poppedBook = currentParams.get('book') || localStorage.getItem('libraryActiveBook') || 'generative';
    
    if (BOOK_CONFIG[poppedBook]) {
      activeBook = poppedBook;
      localStorage.setItem('libraryActiveBook', activeBook); // keep storage synced with history
      setActiveTabUI(activeBook);
      buildLibrary(activeBook);
    }
  });

  // Initialize the first view
  buildLibrary();
});
</script>
</body>
</html>
