<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Articles — Connecting the Dots</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/base.css" />
  <script src="../js/base.js" defer></script>

  <style>
    /* Apply Lora to the entire page */
    body {
      font-family: 'Lora', Georgia, serif;
    }

    /* 1. Improved Header Layout */
    .page-header-container {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end; 
      justify-content: space-between;
      gap: 1.5rem;
      max-width: 1000px;
      margin: 0 auto 3rem auto;
      padding-top: 1.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .articles-header {
      margin: 0;
    }

    .articles-header h1 {
      margin: 0 0 0.5rem 0;
      font-size: 2.25rem;
      letter-spacing: -0.02em;
      transition: font-size 0.2s ease, color 0.2s ease; 
      font-family: inherit; 
    }

    .articles-header h1.search-active {
      font-size: 1.25rem;
      color: var(--muted);
      font-weight: 500;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 1.1rem;
    }

    .page-header-container.search-active .subtitle {
      display: none;
    }

    .articles-toolbar {
      margin: 0;
    }

    /* 2. Controls (Search & Sort) */
    .archive-controls {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .archive-search {
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      width: 250px;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      border-radius: 99px;
      background: var(--surface);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      cursor: text;
    }

    .archive-search:hover,
    .archive-search:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 15%, transparent);
    }

    .archive-search-icon {
      width: 18px;
      height: 18px;
      color: var(--muted);
      flex-shrink: 0;
    }

    .archive-search input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
    }

    .archive-search input::placeholder {
      color: var(--muted);
    }

    .archive-sort {
      font-family: inherit;
      padding: 0.75rem 1rem;
      padding-right: 2.5rem;
      border: 1px solid var(--border);
      border-radius: 99px;
      background: var(--surface);
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      appearance: none; 
      background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2216%22%20height%3D%2216%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%23999%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E");
      background-repeat: no-repeat;
      background-position: right 1rem center;
    }

    .archive-sort:hover,
    .archive-sort:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 15%, transparent);
    }

    /* 3. Tactile Article Cards */
    .articles-list {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .post-item {
      position: relative; 
      padding: 1.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow-sm);
      transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), 
                  box-shadow 0.2s cubic-bezier(0.4, 0, 0.2, 1), 
                  border-color 0.2s ease,
                  opacity 0.3s ease;
      animation: fadeIn 0.4s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .post-item:hover {
      transform: translateY(-4px); 
      box-shadow: var(--shadow-md); 
      border-color: color-mix(in srgb, var(--accent) 50%, var(--border));
    }

    .article-date {
      display: block;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 0.4rem;
      font-family: inherit;
      font-style: italic;
    }

    .post-item h3 {
      margin: 0 0 0.5rem 0; 
      font-size: 1.2rem; 
      font-weight: 600; 
      font-family: inherit;
      text-transform: none; 
      letter-spacing: -0.01em; 
      line-height: 1.3;
    }

    .post-item h3 a {
      color: var(--text);
      text-decoration: none;
    }

    .post-item h3 a::after {
      content: "";
      position: absolute;
      inset: 0;
    }

    .post-item p {
      color: var(--muted);
      margin: 0 0 1rem 0;
      line-height: 1.6;
    }

    .pill-tag {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--accent);
      background: color-mix(in srgb, var(--accent) 10%, transparent);
      border-radius: 99px;
      font-family: inherit;
    }

    /* System States */
    .system-message {
      text-align: center;
      padding: 3rem;
      color: var(--muted);
      font-style: italic;
      border: 1px dashed var(--border);
      border-radius: 16px;
    }
  </style>
</head>

<body>
  <div id="global-nav" data-root="../"></div>

  <main class="page-wrap articles-page">
    
    <div class="page-header-container" id="headerContainer">
      <header class="articles-header">
        <h1 id="mainHeading">Articles & Essays</h1>
        <p class="subtitle">
          Explorations in AI systems, architecture history, and conceptual threads.
        </p>
      </header>

      <div class="articles-toolbar">
        <div class="archive-controls">
          <div class="archive-search" id="searchContainer">
            <svg class="archive-search-icon" viewBox="0 0 24 24" fill="none">
              <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8"/>
              <path d="M20 20L17 17" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
            <input
              id="articleSearch"
              type="text"
              placeholder="Search archive"
              aria-label="Search articles"
            />
          </div>
          
          <select id="sortSelect" class="archive-sort" aria-label="Sort articles">
            <option value="desc">Newest to Oldest</option>
            <option value="asc">Oldest to Newest</option>
          </select>
        </div>
      </div>
    </div>

    <section class="articles-list" id="articlesList">
      <div class="system-message" id="loadingIndicator">Gathering archive...</div>
    </section>

  </main>

  <script src="../js/components.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      // 1. DOM Elements
      const articlesList = document.getElementById("articlesList");
      const sortSelect = document.getElementById("sortSelect");
      const searchInput = document.getElementById("articleSearch");
      const searchContainer = document.getElementById("searchContainer");
      const mainHeading = document.getElementById("mainHeading");
      const headerContainer = document.getElementById("headerContainer");

      // 2. Global State
      let allArticlesData = [];

      // ==========================================
      // MANAGE YOUR ARTICLES HERE
      // ==========================================
      const articleLinks = [
        "Architecture_of_scale.html",
        "ai-timeline.html",
        "word_rep.html"
      ];

      // 3. Focus UX Helper
      searchContainer.addEventListener("click", () => searchInput.focus());

      // 4. Initialization (Fetch & Render)
      async function initializeArchive() {
        try {
          const fetchPromises = articleLinks.map(async (link) => {
            const response = await fetch(link);
            if (!response.ok) return null;
            
            const htmlText = await response.text();
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlText, "text/html");

            // Extract metadata from the fetched HTML
            const title = doc.querySelector("title")?.innerText || "Untitled Article";
            const subtitle = doc.querySelector('meta[name="description"]')?.content || "";
            const author = doc.querySelector('meta[name="author"]')?.content || "Unknown";
            const dateStr = doc.querySelector('meta[name="date"]')?.content || "1970-01-01";
            const tags = doc.querySelector('meta[name="keywords"]')?.content || "";
            const chapter = doc.querySelector('meta[name="chapter"]')?.content || "Article";

            return {
              link,
              title,
              subtitle,
              author,
              dateStr,
              dateObj: new Date(dateStr),
              formattedDate: new Date(dateStr).toLocaleDateString("en-US", {
                year: "numeric", month: "long", day: "numeric", timeZone: "UTC"
              }),
              tags: tags.toLowerCase(),
              chapter
            };
          });

          // Wait for all fetches, filter out failures
          const results = await Promise.all(fetchPromises);
          allArticlesData = results.filter(post => post !== null);

          // Apply initial search params if present in URL
          const params = new URLSearchParams(window.location.search);
          const initialQuery = params.get("q") || "";
          if (initialQuery) searchInput.value = initialQuery;

          // Run the UI update loop
          updateUI();

        } catch (error) {
          console.error("Failed to load articles:", error);
          articlesList.innerHTML = `<div class="system-message">Error loading archive. Please try refreshing.</div>`;
        }
      }

      // 5. The Main Logic Loop (Filters, Sorts, and Draws)
      function updateUI() {
        const query = searchInput.value.trim().toLowerCase();
        const sortOrder = sortSelect.value;

        // A. Filter
        let filteredArticles = allArticlesData.filter(article => {
          const titleMatch = article.title.toLowerCase().includes(query);
          const tagMatch = article.tags.includes(query);
          return !query || titleMatch || tagMatch;
        });

        // B. Sort
        filteredArticles.sort((a, b) => {
          return sortOrder === 'desc' 
            ? b.dateObj - a.dateObj  // Newest
            : a.dateObj - b.dateObj; // Oldest
        });

        // C. Update Header State
        if (query) {
          mainHeading.innerHTML = `Search results for: <em>"${query}"</em> (${filteredArticles.length})`;
          mainHeading.classList.add("search-active");
          headerContainer.classList.add("search-active");
          
          // Update URL silently
          const url = new URL(window.location);
          url.searchParams.set("q", query);
          window.history.replaceState({}, "", url);
        } else {
          mainHeading.innerHTML = "Articles & Essays";
          mainHeading.classList.remove("search-active");
          headerContainer.classList.remove("search-active");
          
          // Clean URL
          const url = new URL(window.location);
          url.searchParams.delete("q");
          window.history.replaceState({}, "", url);
        }

        // D. Render DOM
        articlesList.innerHTML = ""; // Clear list

        if (filteredArticles.length === 0) {
          articlesList.innerHTML = `<div class="system-message">No articles found matching "${query}".</div>`;
          return;
        }

        filteredArticles.forEach(article => {
          const articleEl = document.createElement("article");
          articleEl.className = "post-item";
          
          articleEl.innerHTML = `
            <time class="article-date" datetime="${article.dateStr}">
              ${article.formattedDate} • By ${article.author}
            </time>
            <h3>
              <a href="${article.link}">${article.title}</a>
            </h3>
            <p>${article.subtitle}</p>
            <span class="pill-tag">${article.chapter}</span>
          `;

          articlesList.appendChild(articleEl);
        });
      }

      // 6. Event Listeners
      searchInput.addEventListener("input", updateUI);
      sortSelect.addEventListener("change", updateUI);

      // Kick off the script
      initializeArchive();
    });
  </script>
</body>
</html>
