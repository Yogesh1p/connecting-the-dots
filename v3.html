<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#FDFBF7" id="theme-color-meta">
  <title>Dots — Shatter Animation Sandbox</title>

  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg?v=2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/base.css">
  <script>
    (function(){var t=localStorage.getItem('theme')||'light';if(t==='dark')document.documentElement.setAttribute('data-theme','dark');})();
  </script>
  <script src="js/base.js" defer></script>
  <script src="js/components.js" defer></script>

  <script src="https://d3js.org/d3.v7.min.js"></script>

  <style>
    /* ═══════════════════════════════════
       STANDALONE CSS VARIABLES
    ═══════════════════════════════════ */
    :root {
      --bg:        #FDFBF7;
      --text:      #4A3F35;
      --accent:    #D48C70;
      --surface:   #F4EFE6;
      --border:    #E8DFD1;
      --muted:     #847769;
      --dark:      #2D241E;
      --card-bg:   #FFFFFF;
    }

    [data-theme="dark"] {
      --bg:        #16100C;
      --text:      #C5B49A;
      --accent:    #D48C70;
      --surface:   #1F1510;
      --border:    #2E2018;
      --muted:     #736050;
      --dark:      #EAD9C2;
      --card-bg:   #1C1208;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Lora', Georgia, serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ═══════════════════════════════════
       NATIVE SCROLL TIMELINE
    ═══════════════════════════════════ */
    #scroll-track {
      position: relative;
      width: 100%;
      height: 300vh; /* The distance the user scrolls to complete the animation */
    }

    #sticky-view {
      position: sticky;
      top: 0;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
    }

    /* Top Navigation Fade Wrapper */
    #nav-fade-wrapper {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }

    /* Layer 1: Particles */
    #shatter-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    /* Layer 2: D3 Graph */
    #d3-container {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      opacity: 0;
      pointer-events: none;
    }

    #network-graph {
      width: 100%;
      height: 100%;
      display: block;
      cursor: grab;
    }
    #network-graph:active { cursor: grabbing; }

    /* Layer 3: UI & Search */
    #ui-overlay {
      position: absolute;
      inset: 0;
      z-index: 5;
      display: flex;
      flex-direction: column;
      justify-content: flex-end; /* Push content to bottom */
      padding-bottom: 2.5rem;
      opacity: 0;
      /* CRITICAL: Let clicks pass through overlay so D3 graph can receive them */
      pointer-events: none; 
      transition: opacity 0.5s ease;
    }

    .ui-bottom {
      display: flex;
      justify-content: center; /* Center the search box horizontally */
      width: 100%;
    }

    .archive-search {
      width: 100%;
      max-width: 260px; /* Made smaller */
      padding: 0.6rem 1.2rem; /* Reduced padding */
      border: 1px solid var(--border);
      border-radius: 999px;
      background: color-mix(in srgb, var(--surface) 60%, var(--bg));
      backdrop-filter: blur(8px);
      color: var(--text);
      font: italic 0.85rem 'Lora', serif; /* Smaller font */
      outline: none;
      /* Enable clicking just for the input */
      pointer-events: auto; 
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .archive-search::placeholder { color: var(--muted); opacity: 0.7; }
    .archive-search:focus {
      background: var(--card-bg);
      border-color: var(--accent);
      box-shadow: 0 4px 20px color-mix(in srgb, var(--dark) 5%, transparent);
    }

    /* Scroll Down Hint */
    #scroll-hint {
      position: absolute;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-family: 'JetBrains Mono', monospace;
      color: var(--muted);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      pointer-events: none;
      z-index: 10;
    }
    #scroll-hint-line {
      width: 1px;
      height: 35px;
      background: var(--border);
      position: relative;
      overflow: hidden;
    }
    #scroll-hint-line::after {
      content: '';
      position: absolute;
      top: -100%;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--accent);
      animation: drip 2s ease-in-out infinite;
    }
    @keyframes drip {
      0%   { top: -100%; opacity: 1; }
      100% { top: 110%;  opacity: 0; }
    }

    /* D3 Styling */
    .graph-link {
      stroke: var(--muted, #847769);
      stroke-opacity: 0.18;
      stroke-width: 1.5px;
      transition: stroke-opacity 0.25s, stroke-width 0.25s;
    }
    .graph-node-hub  { fill: var(--accent, #D48C70); stroke: var(--bg, #FFF); stroke-width: 3px; }
    .graph-node-sub  { fill: var(--text, #4A3F35);   stroke: var(--bg, #FFF); stroke-width: 2px; }
    .graph-node-leaf { fill: var(--muted, #847769);  stroke: var(--bg, #FFF); stroke-width: 1.5px; }

    .graph-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      fill: var(--text, #4A3F35);
      pointer-events: none;
      opacity: 0; /* Hidden by default */
      transition: opacity 0.2s ease;
    }
    .graph-label.hub-label { font-size: 0.85rem; font-weight: 600; fill: var(--dark, #2D241E); }
    
    /* Interactive Classes */
    .graph-link.active   { stroke: var(--accent); stroke-opacity: 0.7; stroke-width: 2.5px; }
    .dimmed              { opacity: 0.05; }
    .search-match        { stroke: var(--accent) !important; filter: drop-shadow(0 0 6px var(--accent)); }
  </style>
</head>
<body>

<script>
  function toggleTheme() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
  }
</script>

<div id="scroll-track">
  <div id="sticky-view">
    
    <div id="nav-fade-wrapper">
      <div id="global-nav" data-root=""></div>
    </div>

    <canvas id="shatter-canvas"></canvas>

    <div id="d3-container">
      <svg id="network-graph"></svg>
    </div>

    <div id="ui-overlay">
      <div class="ui-bottom">
        <input type="text" id="graph-search" class="archive-search" placeholder="Search topics (e.g. Transformers)…" autocomplete="off"/>
      </div>
    </div>

    <div id="scroll-hint">
      <span style="opacity: 0.7">Scroll</span>
      <div id="scroll-hint-line"></div>
    </div>

  </div>
</div>

<script>
window.addEventListener('load', () => {

  if (typeof d3 === 'undefined') return;

  function getCssColor(varName, fallbackHex) {
    let val = getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
    if (!val) val = fallbackHex;
    if (val.startsWith('#')) {
      let hex = val.replace('#', '');
      if (hex.length === 3) hex = hex.split('').map(x=>x+x).join('');
      return [parseInt(hex.substr(0,2),16), parseInt(hex.substr(2,2),16), parseInt(hex.substr(4,2),16)];
    }
    return [0,0,0];
  }

  let C = {};
  function updateColors() {
    C.bg     = getCssColor('--bg',      '#FDFBF7');
    C.text   = getCssColor('--text',    '#4A3F35');
    C.dark   = getCssColor('--dark',    '#2D241E');
    C.accent = getCssColor('--accent',  '#D48C70');
    C.muted  = getCssColor('--muted',   '#847769');
  }

  function nodeColor(g) { return g==='hub' ? C.accent : g==='sub' ? C.text : C.muted; }
  function nodeR(g) { return g==='hub' ? 14 : g==='sub' ? 9 : 5; }

  function createGraphData() {
    const nodes = [
      { id:"Autoregressive Models", group:"hub" }, { id:"Large Language Models", group:"hub" },
      { id:"Latent Variable Models",group:"hub" }, { id:"Score-Based Models",    group:"hub" },
      { id:"Fixed-Length Models",   group:"sub" }, { id:"Sequence Models",       group:"sub" },
      { id:"Transformers",          group:"sub" }, { id:"Variational Inference", group:"sub" },
      { id:"Normalizing Flows",     group:"sub" }, { id:"LLM Training",          group:"sub" },
      { id:"LLM Alignment",         group:"sub" }, { id:"Agentic Systems",       group:"sub" },
      { id:"Classical EM",          group:"sub" },
      { id:"FVSBN",              group:"leaf" }, { id:"NADE",               group:"leaf" },
      { id:"MADE",               group:"leaf" }, { id:"RNNs",               group:"leaf" },
      { id:"Word2Vec",           group:"leaf" }, { id:"Attention",          group:"leaf" },
      { id:"MoE",                group:"leaf" }, { id:"LoRA",               group:"leaf" },
      { id:"RLHF",               group:"leaf" }, { id:"DPO",                group:"leaf" },
      { id:"GRPO",               group:"leaf" }, { id:"RAG",                group:"leaf" },
      { id:"ReAct",              group:"leaf" }, { id:"ELBO",               group:"leaf" },
      { id:"BBVI",               group:"leaf" }, { id:"VAE",                group:"leaf" },
      { id:"Reparameterisation", group:"leaf" }, { id:"GMM",                group:"leaf" },
      { id:"HMM",                group:"leaf" }, { id:"Diffusion",          group:"leaf" },
      { id:"DDPM",               group:"leaf" }
    ];
    const links = [
      ["Autoregressive Models","Fixed-Length Models"], ["Autoregressive Models","Sequence Models"],
      ["Fixed-Length Models","FVSBN"], ["Fixed-Length Models","NADE"], ["Fixed-Length Models","MADE"],
      ["Sequence Models","RNNs"], ["Sequence Models","Word2Vec"], ["Sequence Models","Attention"],
      ["Sequence Models","Transformers"], ["Large Language Models","Transformers"],
      ["Large Language Models","LLM Training"], ["Large Language Models","LLM Alignment"],
      ["Large Language Models","Agentic Systems"], ["Transformers","Attention"], ["Transformers","MoE"],
      ["LLM Training","LoRA"], ["LLM Alignment","RLHF"], ["LLM Alignment","DPO"], ["LLM Alignment","GRPO"],
      ["Agentic Systems","RAG"], ["Agentic Systems","ReAct"], ["Latent Variable Models","Variational Inference"],
      ["Latent Variable Models","Normalizing Flows"], ["Latent Variable Models","Classical EM"],
      ["Variational Inference","ELBO"], ["Variational Inference","BBVI"], ["Variational Inference","VAE"],
      ["Variational Inference","Reparameterisation"], ["Classical EM","GMM"], ["Classical EM","HMM"],
      ["Score-Based Models","Diffusion"], ["Diffusion","DDPM"], ["VAE","MADE"], 
      ["Normalizing Flows","Reparameterisation"], ["Transformers","Sequence Models"]
    ].map(([s,t]) => ({ source:s, target:t }));
    
    nodes.forEach(n => n.radius = nodeR(n.group));
    return { nodes, links };
  }

  const track       = document.getElementById('scroll-track');
  const canvas      = document.getElementById('shatter-canvas');
  const ctx         = canvas.getContext('2d', { alpha: false }); 
  const svgCont     = document.getElementById('d3-container');
  const uiOverlay   = document.getElementById('ui-overlay');
  const navWrapper  = document.getElementById('nav-fade-wrapper'); 
  const hint        = document.getElementById('scroll-hint');
  const searchInput = document.getElementById('graph-search');

  let W, H, DPR;
  let particles = [];
  let sceneData;
  let d3sim, isD3Active = false;
  let targetP = 0, currentP = 0;

  function resizeCanvas() {
    W = window.innerWidth;
    H = window.innerHeight;
    DPR = window.devicePixelRatio || 1;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    ctx.scale(DPR, DPR);
    d3.select('#network-graph').attr('width', W).attr('height', H);
    updateColors();
  }

  /* ─────────────────────────────────────────
     Build D3 Graph & Physics Tweaks
  ───────────────────────────────────────── */
  function buildScene() {
    const svg = d3.select('#network-graph');
    svg.selectAll('*').remove();
    sceneData = createGraphData();

    d3sim = d3.forceSimulation(sceneData.nodes)
      .force('link',    d3.forceLink(sceneData.links).id(d => d.id).distance(45)) 
      .force('charge',  d3.forceManyBody().strength(-120)) 
      .force('center',  d3.forceCenter(W / 2, H / 2))
      .force('x',       d3.forceX(W / 2).strength(0.06)) 
      .force('y',       d3.forceY(H / 2).strength(0.06)) 
      .force('collide', d3.forceCollide().radius(d => d.radius + 12)); 

    d3sim.stop();
    for (let i = 0; i < 300; i++) d3sim.tick();

    sceneData.nodes.forEach(n => {
      n.x = Math.max(60, Math.min(W - 60, n.x));
      n.y = Math.max(40, Math.min(H - 40, n.y));
    });

    const link = svg.append('g').selectAll('line').data(sceneData.links).join('line').attr('class','graph-link');
    const node = svg.append('g').selectAll('circle').data(sceneData.nodes).join('circle')
      .attr('class', d => `graph-node-${d.group}`).attr('r', d => d.radius).call(makeDrag(d3sim));
    
    const label = svg.append('g').selectAll('text').data(sceneData.nodes).join('text')
      .attr('class', d => `graph-label${d.group==='hub' ? ' hub-label' : ''}`)
      .attr('dx', d => d.radius + 8)
      .attr('dy', 4)
      .attr('x', d => d.x)
      .attr('y', d => d.y)
      .text(d => d.id);

    d3sim.on('tick', () => {
      link.attr('x1', d => d.source.x).attr('y1', d => d.source.y).attr('x2', d => d.target.x).attr('y2', d => d.target.y);
      node.attr('cx', d => d.x = Math.max(20, Math.min(W-20, d.x))).attr('cy', d => d.y = Math.max(20, Math.min(H-20, d.y)));
      label.attr('x', d => d.x).attr('y', d => d.y);
    });

    let dragging = false, hovered = null, term = '';
    
    function updateState() {
      if (dragging) return;
      if (hovered) {
        // Find hovered node + directly connected nodes
        const conn = new Set([hovered.id]);
        const connL = sceneData.links.filter(l => {
          if (l.source.id===hovered.id || l.target.id===hovered.id) { 
            conn.add(l.source.id); 
            conn.add(l.target.id); 
            return true; 
          }
          return false;
        });

        // Highlight nodes and links
        node.classed('dimmed', n => !conn.has(n.id)).classed('search-match', false);
        link.classed('dimmed', l => !connL.includes(l)).classed('active', l => connL.includes(l));
        
        // Show labels ONLY for the connected nodes
        label.style('opacity', n => conn.has(n.id) ? 1 : 0);

      } else if (term) {
        const m = new Set(sceneData.nodes.filter(n => n.id.toLowerCase().includes(term)).map(n => n.id));
        node.classed('dimmed', n => !m.has(n.id)).classed('search-match', n => m.has(n.id));
        link.classed('dimmed', true).classed('active', false);
        label.style('opacity', n => m.has(n.id) ? 1 : 0);

      } else {
        node.classed('dimmed',false).classed('search-match',false);
        link.classed('dimmed',false).classed('active',false);
        label.style('opacity', 0);
      }
    }

    searchInput.addEventListener('input', e => { term = e.target.value.toLowerCase().trim(); updateState(); });
    node.on('mouseover', (_,d) => { hovered=d; updateState(); });
    node.on('mouseout',  ()    => { hovered=null; updateState(); });

    function makeDrag(sim) {
      return d3.drag()
        .on('start', e => { if(!e.active) sim.alphaTarget(.3).restart(); e.subject.fx=e.subject.x; e.subject.fy=e.subject.y; dragging=true; })
        .on('drag',  e => { e.subject.fx=e.x; e.subject.fy=e.y; })
        .on('end',   e => { if(!e.active) sim.alphaTarget(0); e.subject.fx=null; e.subject.fy=null; dragging=false; updateState(); });
    }

    const off = document.createElement('canvas');
    off.width = W; off.height = H;
    const oc = off.getContext('2d');

const sz = Math.min(86, W / 9);
const centerY = H / 2; // Fixed anchor point
oc.fillStyle = '#000';
oc.textAlign = 'center'; 
oc.textBaseline = 'middle'; // Changed from alphabetic

// Draw "Connecting"
oc.font = `600 ${sz}px 'Lora', Georgia, serif`;
oc.fillText('Connecting', W / 2, centerY - sz * 0.5);

// Draw "the Dots."
oc.font = `italic 400 ${sz}px 'Lora', Georgia, serif`;
oc.fillText('the Dots.', W / 2, centerY + sz * 0.5);

    const px = oc.getImageData(0, 0, W, H).data;
    particles = [];
    const STEP = 1;
    
    const totalW = sceneData.nodes.reduce((s,n) => s + n.radius*n.radius, 0);
    let acc = 0; const cumW = sceneData.nodes.map(n => { acc += n.radius*n.radius/totalW; return acc; });
    function pickNode() {
      const r = Math.random();
      const i = cumW.findIndex(c => r < c);
      return sceneData.nodes[i >= 0 ? i : sceneData.nodes.length-1];
    }

    for (let y = 0; y < H; y += STEP) {
      for (let x = 0; x < W; x += STEP) {
        if (px[(y * W + x) * 4 + 3] > 80) {
          const target = pickNode();
          const a  = Math.random() * Math.PI * 2;
          const rd = Math.random() * target.radius * 0.85;
          particles.push({
  sx: x + (Math.random() - 0.5) * 1.5,
  sy: y + (Math.random() - 0.5) * 1.5,
  tx: target.x + Math.cos(a) * rd,
  ty: target.y + Math.sin(a) * rd,
  node: target,
  r: Math.random() * 0.8 + 0.3, // Reduced from (1.3 + 0.5) for finer detail
  delay: Math.random() * 0.4,   // Increased delay range for a longer "trail"
  arcMag: (Math.random() - 0.5) * 2 * Math.min(W, H) * 0.2
});
        }
      }
    }
  }

  /* ─────────────────────────────────────────
     Canvas Renderer (Shatter effect)
  ───────────────────────────────────────── */
  function lerp(a,b,t) { return a+(b-a)*t; }
  function ease(t)     { return t<.5 ? 2*t*t : -1+(4-2*t)*t; }
  function rgba(c,a)   { return `rgba(${c[0]},${c[1]},${c[2]},${a})`; }

  function renderFrame(p) {
    ctx.fillStyle = `rgb(${C.bg[0]},${C.bg[1]},${C.bg[2]})`;
    ctx.fillRect(0, 0, W, H);

    const travelP = Math.min(1, p / 0.65);
    const edgeP   = p < 0.55 ? 0 : Math.min(1, (p-0.55)/0.30);
    const nodeP   = p < 0.50 ? 0 : Math.min(1, (p-0.50)/0.45);

    if (edgeP > 0) {
      ctx.lineWidth = 1.5;
      sceneData.links.forEach(lk => {
        ctx.beginPath();
        ctx.moveTo(lk.source.x, lk.source.y);
        ctx.lineTo(lk.target.x, lk.target.y);
        ctx.strokeStyle = rgba(C.muted, edgeP * 0.2);
        ctx.stroke();
      });
    }

    if (nodeP > 0) {
      sceneData.nodes.forEach(n => {
        const nc = nodeColor(n.group);
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.radius * nodeP, 0, Math.PI*2);
        ctx.fillStyle   = rgba(nc, nodeP);
        ctx.strokeStyle = `rgb(${C.bg[0]},${C.bg[1]},${C.bg[2]})`;
        ctx.lineWidth   = n.group==='hub' ? 3 : n.group==='sub' ? 2 : 1.5;
        ctx.fill(); ctx.stroke();
      });
    }

    particles.forEach(pt => {
      const localT = Math.max(0, Math.min(1, (travelP - pt.delay) / (1 - pt.delay)));
      const et = ease(localT);

      const mx = (pt.sx + pt.tx) / 2, my = (pt.sy + pt.ty) / 2;
      const dx = pt.tx - pt.sx, dy = pt.ty - pt.sy;
      const len = Math.sqrt(dx*dx + dy*dy) + 0.001;
      const cpx = mx - (dy/len) * pt.arcMag, cpy = my + (dx/len) * pt.arcMag;

      const it = 1 - et;
      const px = it*it*pt.sx + 2*it*et*cpx + et*et*pt.tx;
      const py = it*it*pt.sy + 2*it*et*cpy + et*et*pt.ty;

      const nc = nodeColor(pt.node.group);
      const r  = Math.round(lerp(C.dark[0], nc[0], et));
      const g  = Math.round(lerp(C.dark[1], nc[1], et));
      const b  = Math.round(lerp(C.dark[2], nc[2], et));
      
      const alpha = et > 0.98 ? lerp(1, 0, (et-0.98)/0.02) : 1;

      ctx.beginPath();
      ctx.arc(px, py, pt.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
      ctx.fill();
    });

    if (p < 0.06) {
  const ghostA = Math.pow((0.06 - p) / 0.06, 2) * 0.08;
  const sz = Math.min(86, W / 9);
  const centerY = H / 2;

  ctx.globalAlpha = ghostA;
  ctx.fillStyle = `rgb(${C.dark[0]},${C.dark[1]},${C.dark[2]})`;
  ctx.textAlign = 'center'; 
  ctx.textBaseline = 'middle'; // Match the sampler

  // Top Line
  ctx.font = `600 ${sz}px 'Lora', Georgia, serif`;
  ctx.fillText('Connecting', W / 2, centerY - sz * 0.5);

  // Bottom Line
  ctx.font = `italic 400 ${sz}px 'Lora', Georgia, serif`;
  ctx.fillText('the Dots.', W / 2, centerY + sz * 0.5);
  
  ctx.globalAlpha = 1;
}
  }

  /* ─────────────────────────────────────────
     Scroll Timeline & RAF
  ───────────────────────────────────────── */
  function onScroll() {
    const scrollMax = track.clientHeight - window.innerHeight;
    targetP = Math.max(0, Math.min(1, window.scrollY / scrollMax));
  }

  function loop() {
    currentP += (targetP - currentP) * 0.08;
    if (Math.abs(targetP - currentP) < 0.001) currentP = targetP;

    hint.style.opacity = currentP > 0.02 ? '0' : '1';

    const done = currentP >= 0.985;
    if (!done) {
      if (isD3Active) {
        d3sim.stop();
        svgCont.style.opacity = '0';
        svgCont.style.pointerEvents = 'none';
        canvas.style.opacity = '1';
        
        uiOverlay.style.opacity = '0';
        navWrapper.style.opacity = '0';
        navWrapper.style.pointerEvents = 'none';
        
        isD3Active = false;
      }
      renderFrame(currentP);
    } else {
      if (!isD3Active) {
        canvas.style.opacity = '0';
        svgCont.style.opacity = '1';
        svgCont.style.pointerEvents = 'auto';
        
        uiOverlay.style.opacity = '1';
        
        navWrapper.style.opacity = '1';
        navWrapper.style.pointerEvents = 'auto';

        d3sim.alpha(0.02).restart();
        isD3Active = true;
      }
    }
    requestAnimationFrame(loop);
  }

  resizeCanvas();
  buildScene();
  window.addEventListener('scroll', onScroll, {passive: true});
  window.addEventListener('resize', () => { resizeCanvas(); buildScene(); onScroll(); });
  
  new MutationObserver(() => {
    updateColors();
    if (!isD3Active) renderFrame(currentP);
  }).observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });

  onScroll();
  loop();

});
</script>

</body>
</html>
