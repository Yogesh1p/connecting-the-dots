<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#FDFBF7" id="theme-color-meta">
  <title>Dots — Shatter Animation Sandbox</title>

  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg?v=2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/base.css">
  <script>
    (function(){var t=localStorage.getItem('theme')||'light';if(t==='dark')document.documentElement.setAttribute('data-theme','dark');})();
  </script>
  <script src="js/base.js" defer></script>
  <script src="js/components.js" defer></script>

  <script src="https://d3js.org/d3.v7.min.js"></script>

  <style>
    :root {
      --bg:        #FDFBF7;
      --text:      #4A3F35;
      --accent:    #D48C70;
      --surface:   #F4EFE6;
      --border:    #E8DFD1;
      --muted:     #847769;
      --dark:      #2D241E;
      --card-bg:   #FFFFFF;
    }

    [data-theme="dark"] {
      --bg:        #16100C;
      --text:      #C5B49A;
      --accent:    #D48C70;
      --surface:   #1F1510;
      --border:    #2E2018;
      --muted:     #736050;
      --dark:      #EAD9C2;
      --card-bg:   #1C1208;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Lora', Georgia, serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    #stage {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
    }

    #nav-fade-wrapper {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }

    #shatter-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    #d3-container {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }

    #network-graph {
      width: 100%;
      height: 100%;
      display: block;
      cursor: grab;
    }
    #network-graph:active { cursor: grabbing; }

    #ui-overlay {
      position: absolute;
      inset: 0;
      z-index: 5;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding-bottom: 2.5rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }

    .ui-bottom {
      display: flex;
      justify-content: center;
      width: 100%;
    }

    .archive-search {
      width: 100%;
      max-width: 260px;
      padding: 0.6rem 1.2rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: color-mix(in srgb, var(--surface) 60%, var(--bg));
      backdrop-filter: blur(8px);
      color: var(--text);
      font: italic 0.85rem 'Lora', serif;
      outline: none;
      pointer-events: auto;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .archive-search::placeholder { color: var(--muted); opacity: 0.7; }
    .archive-search:focus {
      background: var(--card-bg);
      border-color: var(--accent);
      box-shadow: 0 4px 20px color-mix(in srgb, var(--dark) 5%, transparent);
    }

    /* ── ENTER BUTTON ── */
    #enter-btn-wrapper {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 3rem;
      transition: opacity 0.35s ease;
    }

    #enter-btn {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.6rem 1.5rem 0.6rem 1.2rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: color-mix(in srgb, var(--surface) 55%, var(--bg));
      backdrop-filter: blur(10px);
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      outline: none;
      transition: border-color 0.25s, color 0.25s, background 0.25s, box-shadow 0.25s;
      animation: btn-pulse 2.8s ease-in-out infinite;
    }
    #enter-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: color-mix(in srgb, var(--surface) 80%, var(--bg));
      box-shadow: 0 0 20px color-mix(in srgb, var(--accent) 18%, transparent);
      animation: none;
    }
    #enter-btn:active { transform: scale(0.97); }

    .btn-arrow {
      width: 14px; height: 14px;
      opacity: 0.6;
      transition: opacity 0.2s, transform 0.2s;
    }
    #enter-btn:hover .btn-arrow { opacity: 1; transform: translateX(2px); }

    @keyframes btn-pulse {
      0%,100% { box-shadow: 0 0 0 0 transparent; }
      50%      { box-shadow: 0 0 14px color-mix(in srgb, var(--accent) 14%, transparent); }
    }

    /* D3 Styling */
    .graph-link {
      stroke: var(--muted, #847769);
      stroke-opacity: 0.18;
      stroke-width: 1.5px;
      transition: stroke-opacity 0.25s, stroke-width 0.25s;
    }
    .graph-node-hub  { fill: var(--accent, #D48C70); stroke: var(--bg, #FFF); stroke-width: 3px; }
    .graph-node-sub  { fill: var(--text, #4A3F35);   stroke: var(--bg, #FFF); stroke-width: 2px; }
    .graph-node-leaf { fill: var(--muted, #847769);  stroke: var(--bg, #FFF); stroke-width: 1.5px; }

    .graph-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      fill: var(--text, #4A3F35);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    .graph-label.hub-label { font-size: 0.85rem; font-weight: 600; fill: var(--dark, #2D241E); }
    
    .graph-link.active { stroke: var(--accent); stroke-opacity: 0.7; stroke-width: 2.5px; }
    .dimmed            { opacity: 0.05; }
    .search-match      { stroke: var(--accent) !important; filter: drop-shadow(0 0 6px var(--accent)); }
  </style>
</head>
<body>

<script>
  function toggleTheme() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
  }
</script>

<div id="stage">

  <div id="nav-fade-wrapper">
    <div id="global-nav" data-root=""></div>
  </div>

  <canvas id="shatter-canvas"></canvas>

  <div id="d3-container">
    <svg id="network-graph"></svg>
  </div>

  <div id="ui-overlay">
    <div class="ui-bottom">
      <input type="text" id="graph-search" class="archive-search" placeholder="Search topics (e.g. Transformers)…" autocomplete="off"/>
    </div>
  </div>

  <div id="enter-btn-wrapper">
    <button id="enter-btn" aria-label="Begin">
      Enter
      <svg class="btn-arrow" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 7h10M8 3l4 4-4 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

</div>

<script>
window.addEventListener('load', () => {

  if (typeof d3 === 'undefined') return;

  /* ═══════════════════════════════════════════
     MINIMAL AUDIO — subtle sine tap on node hover only.
     All transition sounds removed.
  ═══════════════════════════════════════════ */
  let AC = null;
  let audioUnlocked = false;

  function unlockAudio() {
    if (audioUnlocked) return;
    audioUnlocked = true;
    AC = new (window.AudioContext || window.webkitAudioContext)();
    AC.resume();
  }

  function crispTap(nodeGroup) {
    if (!AC) return;
    if (AC.state === 'suspended') AC.resume();
    const freq = nodeGroup === 'hub' ? 9500 : nodeGroup === 'sub' ? 7200 : 5800;
    const t    = AC.currentTime;
    const osc  = AC.createOscillator();
    const g    = AC.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    g.gain.setValueAtTime(0.0001, t);
    g.gain.linearRampToValueAtTime(0.032, t + 0.003);
    g.gain.linearRampToValueAtTime(0.0001, t + 0.025);
    osc.connect(g); g.connect(AC.destination);
    osc.start(t); osc.stop(t + 0.030);
  }

  /* ═══════════════════════════════════════════ */

  function getCssColor(varName, fallbackHex) {
    let val = getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
    if (!val) val = fallbackHex;
    if (val.startsWith('#')) {
      let hex = val.replace('#', '');
      if (hex.length === 3) hex = hex.split('').map(x=>x+x).join('');
      return [parseInt(hex.substr(0,2),16), parseInt(hex.substr(2,2),16), parseInt(hex.substr(4,2),16)];
    }
    return [0,0,0];
  }

  let C = {};
  function updateColors() {
    C.bg     = getCssColor('--bg',      '#FDFBF7');
    C.text   = getCssColor('--text',    '#4A3F35');
    C.dark   = getCssColor('--dark',    '#2D241E');
    C.accent = getCssColor('--accent',  '#D48C70');
    C.muted  = getCssColor('--muted',   '#847769');
  }

  function nodeColor(g) { return g==='hub' ? C.accent : g==='sub' ? C.text : C.muted; }
  function nodeR(g) { return g==='hub' ? 14 : g==='sub' ? 9 : 5; }

  function createGraphData() {
    const nodes = [
      { id:"Autoregressive Models", group:"hub" }, { id:"Large Language Models", group:"hub" },
      { id:"Latent Variable Models",group:"hub" }, { id:"Score-Based Models",    group:"hub" },
      { id:"Fixed-Length Models",   group:"sub" }, { id:"Sequence Models",       group:"sub" },
      { id:"Transformers",          group:"sub" }, { id:"Variational Inference", group:"sub" },
      { id:"Normalizing Flows",     group:"sub" }, { id:"LLM Training",          group:"sub" },
      { id:"LLM Alignment",         group:"sub" }, { id:"Agentic Systems",       group:"sub" },
      { id:"Classical EM",          group:"sub" },
      { id:"FVSBN",group:"leaf"},{id:"NADE",group:"leaf"},{id:"MADE",group:"leaf"},
      { id:"RNNs",group:"leaf"},{id:"Word2Vec",group:"leaf"},{id:"Attention",group:"leaf"},
      { id:"MoE",group:"leaf"},{id:"LoRA",group:"leaf"},{id:"RLHF",group:"leaf"},
      { id:"DPO",group:"leaf"},{id:"GRPO",group:"leaf"},{id:"RAG",group:"leaf"},
      { id:"ReAct",group:"leaf"},{id:"ELBO",group:"leaf"},{id:"BBVI",group:"leaf"},
      { id:"VAE",group:"leaf"},{id:"Reparameterisation",group:"leaf"},{id:"GMM",group:"leaf"},
      { id:"HMM",group:"leaf"},{id:"Diffusion",group:"leaf"},{id:"DDPM",group:"leaf"}
    ];
    const links = [
      ["Autoregressive Models","Fixed-Length Models"],["Autoregressive Models","Sequence Models"],
      ["Fixed-Length Models","FVSBN"],["Fixed-Length Models","NADE"],["Fixed-Length Models","MADE"],
      ["Sequence Models","RNNs"],["Sequence Models","Word2Vec"],["Sequence Models","Attention"],
      ["Sequence Models","Transformers"],["Large Language Models","Transformers"],
      ["Large Language Models","LLM Training"],["Large Language Models","LLM Alignment"],
      ["Large Language Models","Agentic Systems"],["Transformers","Attention"],["Transformers","MoE"],
      ["LLM Training","LoRA"],["LLM Alignment","RLHF"],["LLM Alignment","DPO"],["LLM Alignment","GRPO"],
      ["Agentic Systems","RAG"],["Agentic Systems","ReAct"],["Latent Variable Models","Variational Inference"],
      ["Latent Variable Models","Normalizing Flows"],["Latent Variable Models","Classical EM"],
      ["Variational Inference","ELBO"],["Variational Inference","BBVI"],["Variational Inference","VAE"],
      ["Variational Inference","Reparameterisation"],["Classical EM","GMM"],["Classical EM","HMM"],
      ["Score-Based Models","Diffusion"],["Diffusion","DDPM"],["VAE","MADE"],
      ["Normalizing Flows","Reparameterisation"],["Transformers","Sequence Models"]
    ].map(([s,t]) => ({ source:s, target:t }));
    nodes.forEach(n => n.radius = nodeR(n.group));
    return { nodes, links };
  }

  const canvas       = document.getElementById('shatter-canvas');
  const ctx          = canvas.getContext('2d', { alpha: false });
  const svgCont      = document.getElementById('d3-container');
  const uiOverlay    = document.getElementById('ui-overlay');
  const navWrapper   = document.getElementById('nav-fade-wrapper');
  const enterWrapper = document.getElementById('enter-btn-wrapper');
  const enterBtn     = document.getElementById('enter-btn');
  const searchInput  = document.getElementById('graph-search');

  let W, H, DPR;
  let particles = [];
  let sceneData;
  let d3sim, isD3Active = false;

  let transitionDone = false;
  let animating      = false;
  let animStartTime  = null;
  const ANIM_DURATION = 2600; // ms

  function resizeCanvas() {
    W = window.innerWidth;
    H = window.innerHeight;
    DPR = window.devicePixelRatio || 1;
    canvas.width  = W * DPR;
    canvas.height = H * DPR;
    ctx.scale(DPR, DPR);
    d3.select('#network-graph').attr('width', W).attr('height', H);
    updateColors();
  }

  /* ── Build D3 graph + particles ── */
  function buildScene() {
    const svg = d3.select('#network-graph');
    svg.selectAll('*').remove();
    sceneData = createGraphData();

    d3sim = d3.forceSimulation(sceneData.nodes)
      .force('link',    d3.forceLink(sceneData.links).id(d => d.id).distance(45))
      .force('charge',  d3.forceManyBody().strength(-120))
      .force('center',  d3.forceCenter(W / 2, H / 2))
      .force('x',       d3.forceX(W / 2).strength(0.06))
      .force('y',       d3.forceY(H / 2).strength(0.06))
      .force('collide', d3.forceCollide().radius(d => d.radius + 12));

    d3sim.stop();
    for (let i = 0; i < 300; i++) d3sim.tick();

    sceneData.nodes.forEach(n => {
      n.x = Math.max(60, Math.min(W - 60, n.x));
      n.y = Math.max(40, Math.min(H - 40, n.y));
    });

    const link  = svg.append('g').selectAll('line').data(sceneData.links).join('line').attr('class','graph-link');
    const node  = svg.append('g').selectAll('circle').data(sceneData.nodes).join('circle')
      .attr('class', d => `graph-node-${d.group}`).attr('r', d => d.radius).call(makeDrag(d3sim));
    const label = svg.append('g').selectAll('text').data(sceneData.nodes).join('text')
      .attr('class', d => `graph-label${d.group==='hub' ? ' hub-label' : ''}`)
      .attr('dx', d => d.radius + 8).attr('dy', 4)
      .attr('x', d => d.x).attr('y', d => d.y)
      .text(d => d.id);

    d3sim.on('tick', () => {
      link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
          .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
      node.attr('cx', d => d.x = Math.max(20, Math.min(W-20, d.x)))
          .attr('cy', d => d.y = Math.max(20, Math.min(H-20, d.y)));
      label.attr('x', d => d.x).attr('y', d => d.y);
    });

    let dragging = false, hovered = null, term = '';

    function updateState() {
      if (dragging) return;
      if (hovered) {
        const conn = new Set([hovered.id]);
        const connL = sceneData.links.filter(l => {
          if (l.source.id===hovered.id || l.target.id===hovered.id) {
            conn.add(l.source.id); conn.add(l.target.id); return true;
          }
          return false;
        });
        node.classed('dimmed', n => !conn.has(n.id)).classed('search-match', false);
        link.classed('dimmed', l => !connL.includes(l)).classed('active', l => connL.includes(l));
        label.style('opacity', n => conn.has(n.id) ? 1 : 0);
      } else if (term) {
        const m = new Set(sceneData.nodes.filter(n => n.id.toLowerCase().includes(term)).map(n => n.id));
        node.classed('dimmed', n => !m.has(n.id)).classed('search-match', n => m.has(n.id));
        link.classed('dimmed', true).classed('active', false);
        label.style('opacity', n => m.has(n.id) ? 1 : 0);
      } else {
        node.classed('dimmed',false).classed('search-match',false);
        link.classed('dimmed',false).classed('active',false);
        label.style('opacity', 0);
      }
    }

    searchInput.addEventListener('input', e => { term = e.target.value.toLowerCase().trim(); updateState(); });
    node.on('mouseover', (_,d) => { hovered=d; updateState(); crispTap(d.group); });
    node.on('mouseout',  ()    => { hovered=null; updateState(); });

    function makeDrag(sim) {
      return d3.drag()
        .on('start', e => { if(!e.active) sim.alphaTarget(.3).restart(); e.subject.fx=e.subject.x; e.subject.fy=e.subject.y; dragging=true; })
        .on('drag',  e => { e.subject.fx=e.x; e.subject.fy=e.y; })
        .on('end',   e => { if(!e.active) sim.alphaTarget(0); e.subject.fx=null; e.subject.fy=null; dragging=false; updateState(); });
    }

    // Rasterise "Connecting the Dots." into particles
    const off = document.createElement('canvas');
    off.width = W; off.height = H;
    const oc = off.getContext('2d');
    const sz = Math.min(86, W / 9);
    oc.fillStyle = '#000';
    oc.font = `600 ${sz}px 'Lora', Georgia, serif`;
    oc.textAlign = 'center'; oc.textBaseline = 'alphabetic';
    oc.fillText('Connecting', W / 2, H / 2 - sz * 0.2);
    oc.font = `italic 400 ${sz}px 'Lora', Georgia, serif`;
    oc.fillText('the Dots.', W / 2, H / 2 + sz * 0.9);

    const pxData = oc.getImageData(0, 0, W, H).data;
    particles = [];
    const totalW = sceneData.nodes.reduce((s,n) => s + n.radius*n.radius, 0);
    let acc = 0;
    const cumW = sceneData.nodes.map(n => { acc += n.radius*n.radius/totalW; return acc; });
    function pickNode() {
      const r = Math.random();
      const i = cumW.findIndex(c => r < c);
      return sceneData.nodes[i >= 0 ? i : sceneData.nodes.length-1];
    }
    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        if (pxData[(y * W + x) * 4 + 3] > 80) {
          const target = pickNode();
          const a  = Math.random() * Math.PI * 2;
          const rd = Math.random() * target.radius * 0.85;
          particles.push({
            sx: x + (Math.random()-.5)*1.5, sy: y + (Math.random()-.5)*1.5,
            tx: target.x + Math.cos(a)*rd,  ty: target.y + Math.sin(a)*rd,
            node: target,
            r: Math.random() * 1.3 + 0.5,
            delay: Math.random() * 0.3,
            arcMag: (Math.random() - 0.5) * 2 * Math.min(W, H) * 0.2
          });
        }
      }
    }
  }

  /* ── Canvas renderer ── */
  function lerp(a,b,t) { return a+(b-a)*t; }
  function ease(t)     { return t<.5 ? 2*t*t : -1+(4-2*t)*t; }
  function rgba(c,a)   { return `rgba(${c[0]},${c[1]},${c[2]},${a})`; }

  function renderFrame(p) {
    ctx.fillStyle = `rgb(${C.bg[0]},${C.bg[1]},${C.bg[2]})`;
    ctx.fillRect(0, 0, W, H);

    const travelP = Math.min(1, p / 0.65);
    const edgeP   = p < 0.55 ? 0 : Math.min(1, (p-0.55)/0.30);
    const nodeP   = p < 0.50 ? 0 : Math.min(1, (p-0.50)/0.45);

    if (edgeP > 0) {
      ctx.lineWidth = 1.5;
      sceneData.links.forEach(lk => {
        ctx.beginPath();
        ctx.moveTo(lk.source.x, lk.source.y);
        ctx.lineTo(lk.target.x, lk.target.y);
        ctx.strokeStyle = rgba(C.muted, edgeP * 0.2);
        ctx.stroke();
      });
    }

    if (nodeP > 0) {
      sceneData.nodes.forEach(n => {
        const nc = nodeColor(n.group);
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.radius * nodeP, 0, Math.PI*2);
        ctx.fillStyle   = rgba(nc, nodeP);
        ctx.strokeStyle = `rgb(${C.bg[0]},${C.bg[1]},${C.bg[2]})`;
        ctx.lineWidth   = n.group==='hub' ? 3 : n.group==='sub' ? 2 : 1.5;
        ctx.fill(); ctx.stroke();
      });
    }

    particles.forEach(pt => {
      const localT = Math.max(0, Math.min(1, (travelP - pt.delay) / (1 - pt.delay)));
      const et = ease(localT);
      const mx = (pt.sx + pt.tx) / 2, my = (pt.sy + pt.ty) / 2;
      const dx = pt.tx - pt.sx, dy = pt.ty - pt.sy;
      const len = Math.sqrt(dx*dx + dy*dy) + 0.001;
      const cpx = mx - (dy/len) * pt.arcMag, cpy = my + (dx/len) * pt.arcMag;
      const it = 1 - et;
      const px = it*it*pt.sx + 2*it*et*cpx + et*et*pt.tx;
      const py = it*it*pt.sy + 2*it*et*cpy + et*et*pt.ty;
      const nc = nodeColor(pt.node.group);
      const r  = Math.round(lerp(C.dark[0], nc[0], et));
      const g  = Math.round(lerp(C.dark[1], nc[1], et));
      const b  = Math.round(lerp(C.dark[2], nc[2], et));
      const alpha = et > 0.98 ? lerp(1, 0, (et-0.98)/0.02) : 1;
      ctx.beginPath();
      ctx.arc(px, py, pt.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
      ctx.fill();
    });

    // Ghost text fades instantly once animation starts
    if (p < 0.06) {
      const ghostA = Math.pow((0.06-p)/0.06, 2) * 0.08;
      const sz = Math.min(86, W/9);
      ctx.globalAlpha = ghostA;
      ctx.fillStyle   = `rgb(${C.dark[0]},${C.dark[1]},${C.dark[2]})`;
      ctx.font = `600 ${sz}px 'Lora', Georgia, serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
      ctx.fillText('Connecting', W/2, H/2 - sz*0.2);
      ctx.font = `italic 400 ${sz}px 'Lora', Georgia, serif`;
      ctx.fillText('the Dots.', W/2, H/2 + sz*0.9);
      ctx.globalAlpha = 1;
    }
  }

  /* ── RAF loop — timer driven, no scroll ── */
  function loop() {
    if (animating && !transitionDone) {
      const elapsed = performance.now() - animStartTime;
      const rawP    = Math.min(1, elapsed / ANIM_DURATION);
      // Apply overall easing (ease-in-out quad)
      const p = rawP < 0.5 ? 2*rawP*rawP : -1+(4-2*rawP)*rawP;

      renderFrame(p);

      if (rawP >= 1) {
        // Transition complete — hand off to D3, never come back
        transitionDone = true;
        animating = false;
        canvas.style.transition = 'opacity 0.4s ease';
        canvas.style.opacity = '0';
        svgCont.style.opacity = '1';
        svgCont.style.pointerEvents = 'auto';
        uiOverlay.style.opacity = '1';
        navWrapper.style.opacity = '1';
        navWrapper.style.pointerEvents = 'auto';
        enterWrapper.style.display = 'none'; // permanently gone
        d3sim.alpha(0.02).restart();
        isD3Active = true;
      }
    } else if (!transitionDone && !animating) {
      // Idle state — render static opening frame
      renderFrame(0);
    }

    requestAnimationFrame(loop);
  }

  /* ── Enter button ── */
  function startTransition() {
    if (animating || transitionDone) return;
    animating = true;
    animStartTime = performance.now();
    // Fade out button wrapper
    enterWrapper.style.opacity = '0';
    enterWrapper.style.pointerEvents = 'none';
  }

  enterBtn.addEventListener('click', () => {
    unlockAudio();
    startTransition();
  });

  // Keyboard shortcut — Enter or Space
  document.addEventListener('keydown', e => {
    if ((e.key === 'Enter' || e.key === ' ') && !animating && !transitionDone) {
      e.preventDefault();
      unlockAudio();
      startTransition();
    }
  });

  /* ── Init ── */
  resizeCanvas();
  buildScene();
  renderFrame(0); // draw text immediately

  window.addEventListener('resize', () => {
    if (transitionDone) return; // don't rebuild after handoff
    resizeCanvas();
    buildScene();
    renderFrame(0);
  });

  new MutationObserver(() => {
    updateColors();
    if (!transitionDone && !animating) renderFrame(0);
  }).observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });

  loop();
});
</script>

</body>
