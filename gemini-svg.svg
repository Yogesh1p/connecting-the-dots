<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="dotGrid" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#E8DFD1" />
    </pattern>
    
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&amp;display=swap');
      
      .serif { font-family: 'Lora', Georgia, serif; }
      .sans { font-family: system-ui, -apple-system, sans-serif; }
      
      .title { font-size: 82px; font-weight: 700; fill: #2D241E; letter-spacing: -0.02em; }
      .category { font-size: 22px; font-weight: 600; fill: #D48C70; letter-spacing: 0.15em; text-transform: uppercase; }
      .author { font-size: 26px; font-weight: 600; fill: #4A3F35; }
      .site { font-size: 26px; font-style: italic; fill: #847769; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="#FDFBF7" />
  
  <rect width="100%" height="100%" fill="url(#dotGrid)" />

  <circle cx="1100" cy="550" r="400" fill="#D48C70" opacity="0.05" />
  <circle cx="1100" cy="550" r="250" fill="none" stroke="#D48C70" stroke-width="1" opacity="0.2" />

  <rect x="60" y="60" width="1080" height="510" fill="none" stroke="#E8DFD1" stroke-width="2" />

  <g transform="translate(130, 200)">
    <text x="0" y="0" class="sans category">LARGE LANGUAGE MODELS</text>
    
    <text x="0" y="110" class="serif title">
      <tspan x="0" dy="0">Position</tspan>
      <tspan x="0" dy="95">Representation</tspan>
    </text>
  </g>

  <g transform="translate(130, 500)">
    <line x1="0" y1="-40" x2="940" y2="-40" stroke="#E8DFD1" stroke-width="2" />
    
    <text x="0" y="10" class="sans author">Yogesh</text>
    
    <text x="940" y="10" class="serif site" text-anchor="end">Connecting the Dots</text>
  </g>
</svg>
